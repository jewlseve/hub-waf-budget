<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub & Waf Budget</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:15px;color:#1a1a1a;background:#f5f5f0;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.12);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:16px;font-weight:500}
.period-badge{font-size:12px;color:#666;background:#f0efea;padding:4px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.12)}
.tabs{display:flex;gap:4px;padding:12px 20px 0;background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.12);overflow-x:auto}
.tab{padding:8px 14px;border-radius:6px 6px 0 0;font-size:13px;cursor:pointer;border:none;background:none;color:#666;white-space:nowrap;border-bottom:2px solid transparent;font-family:inherit}
.tab.active{color:#1a1a1a;font-weight:500;border-bottom:2px solid #1a1a1a}
.content{padding:20px;flex:1;max-width:900px;margin:0 auto;width:100%}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:16px 20px;margin-bottom:16px}
.card-title{font-size:12px;font-weight:500;color:#666;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.04em}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.metric{background:#f5f5f0;border-radius:8px;padding:12px 14px}
.metric-label{font-size:12px;color:#666;margin-bottom:4px}
.metric-value{font-size:20px;font-weight:500}
.positive{color:#0F6E56}.negative{color:#A32D2D}.warning{color:#854F0B}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.bar-label{width:150px;color:#666;text-align:right;flex-shrink:0;font-size:12px}
.bar-track{flex:1;height:8px;background:#f0efea;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-amount{width:75px;text-align:right;font-variant-numeric:tabular-nums;font-size:13px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.three{grid-template-columns:2fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:#666}
.form-group input,.form-group select{font-size:14px;padding:8px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a;width:100%;font-family:inherit}
.btn{padding:8px 16px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;font-family:inherit}
.btn:hover{background:#f5f5f0}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.primary:hover{opacity:0.85}
.btn.danger{color:#A32D2D;border-color:#F7C1C1}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{text-align:left;padding:8px 10px;font-weight:500;color:#666;border-bottom:0.5px solid rgba(0,0,0,0.1);font-size:12px}
.table td{padding:8px 10px;border-bottom:0.5px solid rgba(0,0,0,0.07);vertical-align:middle}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:#f9f9f7}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-bills{background:#E6F1FB;color:#0C447C}
.badge-debt{background:#FCEBEB;color:#791F1F}
.badge-income{background:#EAF3DE;color:#27500A}
.badge-savings{background:#E1F5EE;color:#085041}
.badge-transfer{background:#EEEDFE;color:#3C3489}
.badge-unknown{background:#f0efea;color:#666}
.section-title{font-size:15px;font-weight:500;margin-bottom:12px}
.divider{border:none;border-top:0.5px solid rgba(0,0,0,0.1);margin:16px 0}
.empty{text-align:center;padding:40px 20px;color:#666;font-size:13px}
.progress-bar{height:10px;background:#f0efea;border-radius:6px;overflow:hidden;margin:6px 0}
.progress-fill{height:100%;border-radius:6px;background:#1D9E75}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-info{background:#E6F1FB;color:#0C447C;border:0.5px solid #B5D4F4}
.alert-warn{background:#FAEEDA;color:#633806;border:0.5px solid #FAC775}
.debt-card{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid rgba(0,0,0,0.07)}
.debt-card:last-child{border-bottom:none}
.debt-info{flex:1;min-width:0}
.debt-name{font-weight:500;font-size:14px}
.debt-meta{font-size:12px;color:#666;margin-top:2px}
.debt-balance{text-align:right;min-width:100px}
.debt-balance-num{font-size:16px;font-weight:500;color:#A32D2D}
.debt-payment{font-size:12px;color:#666}
.bill-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,0.07)}
.bill-row:last-child{border-bottom:none}
.bill-name{font-weight:500;font-size:14px}
.bill-due{font-size:12px;color:#666}
.bill-amount{font-size:15px;font-weight:500}
.upload-zone{border:1px dashed rgba(0,0,0,0.2);border-radius:12px;padding:24px;text-align:center;cursor:pointer;color:#666;font-size:13px;margin-bottom:12px}
.upload-zone:hover{background:#f5f5f0}
.snowball-order{font-size:11px;color:#666;background:#f0efea;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:500}
.history-row{display:grid;grid-template-columns:140px 1fr 1fr 1fr 1fr 1fr;gap:8px;padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,0.07);font-size:13px;align-items:center}
.history-row:last-child{border-bottom:none}
.history-header{font-weight:500;font-size:12px;color:#666}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1>Hub & Waf Budget</h1>
  <span class="period-badge" id="period-label">Loading...</span>
</div>
<div class="tabs">
  <button class="tab active" onclick="showTab('dashboard')">Dashboard</button>
  <button class="tab" onclick="showTab('history')">History</button>
  <button class="tab" onclick="showTab('entry')">Add Data</button>
  <button class="tab" onclick="showTab('import')">Import CSV</button>
  <button class="tab" onclick="showTab('bills')">Bills</button>
  <button class="tab" onclick="showTab('debts')">Debts</button>
  <button class="tab" onclick="showTab('planits')">Plan It / BNPL</button>
  <button class="tab" onclick="showTab('savings')">Savings & Subs</button>
  <button class="tab" onclick="showTab('settings')">Settings</button>
</div>
<div class="content" id="content"></div>
</div>

<script>
const CATS=['Income','Bills','Debt','Groceries','Dining','Travel','Clothing','Shopping','Home','Entertainment','Health','Personal Care','Work Expenses','Remittance','Savings','Transfer','Other'];
const BARCOLORS={Bills:'#378ADD',Debt:'#E24B4A',Groceries:'#639922',Dining:'#BA7517',Travel:'#534AB7',Clothing:'#D4537E',Shopping:'#E8873A',Entertainment:'#1D9E75',Other:'#888780',Remittance:'#D85A30','Work Expenses':'#5DCAA5',Home:'#7F77DD','Personal Care':'#EF9F27',Health:'#1D9E75',Savings:'#1D9E75'};

const DEFAULT_MAPPINGS={'Cooke Curtis':{label:'Rent',cat:'Bills'},'Novuna Personal':{label:'Furniture Village',cat:'Bills'},'EE Limited':{label:'EE (SIM)',cat:'Bills'},'EE Ltd':{label:'EE Broadband',cat:'Bills'},'Scdc':{label:'Council Tax',cat:'Bills'},'Barclayloan':{label:'BarcLoan Waf',cat:'Debt'},'Bloan':{label:'BarcLoan Hub',cat:'Debt'},'B/Card Forward':{label:'Barclaycard Waf',cat:'Debt'},'Mr Rene Inapan':{label:'Barclaycard Hub',cat:'Debt'},'One Utility Bill':{label:'Electricity',cat:'Bills'},'Amazon Prime':{label:'Amazon Prime',cat:'Bills'},'Disney':{label:'Disney+',cat:'Bills'},'Adobe':{label:'Adobe',cat:'Bills'},'Vitality':{label:'Vitality Insurance',cat:'Bills'},'Microsoft':{label:'Microsoft 365',cat:'Bills'},'Tesco':{label:'Tesco',cat:'Groceries'},'Sainsbury':{label:"Sainsbury's",cat:'Groceries'},'Lidl':{label:'Lidl',cat:'Groceries'},'Aldi':{label:'Aldi',cat:'Groceries'},'Deliveroo':{label:'Deliveroo',cat:'Dining'},'Just Eat':{label:'Just Eat',cat:'Dining'},'Uber Eats':{label:'Uber Eats',cat:'Dining'},'Trainline':{label:'Trainline',cat:'Travel'},'National Rail':{label:'National Rail',cat:'Travel'},'Tfl':{label:'TfL',cat:'Travel'}};

const DEFAULT_BILLS=[{name:'Rent',amount:1425,day:21,cat:'Bills'},{name:'Council Tax',amount:192,day:8,cat:'Bills'},{name:'Electricity',amount:250.73,day:7,cat:'Bills'},{name:'EE (SIM)',amount:67.78,day:28,cat:'Bills'},{name:'EE Broadband',amount:44.99,day:21,cat:'Bills'},{name:'Furniture Village',amount:78.30,day:0,cat:'Bills'},{name:'Vitality Insurance',amount:55.14,day:0,cat:'Bills'},{name:'Amazon Prime',amount:8.99,day:27,cat:'Bills'},{name:'Microsoft 365',amount:14.99,day:22,cat:'Bills'},{name:'Disney+',amount:2.50,day:0,cat:'Bills'},{name:'Adobe',amount:9.98,day:0,cat:'Bills'},{name:'Wildlife Trust',amount:2.50,day:6,cat:'Bills'},{name:"SOS Children's Village",amount:16.12,day:0,cat:'Bills'},{name:'HP Instant Ink',amount:1.50,day:0,cat:'Bills'},{name:'Water',amount:181,day:0,cat:'Bills'},{name:'Apple Watch (Hub)',amount:7.50,day:0,cat:'Bills'}];

const DEFAULT_DEBTS=[{name:'Amex',balance:0,initialBalance:0,rate:22.9,minPayment:1500,notes:'Travel & groceries card'},{name:'Barclaycard Hub',balance:0,initialBalance:0,rate:0,minPayment:250,notes:'Personal spending'},{name:'Barclaycard Waf',balance:0,initialBalance:0,rate:0,minPayment:400,notes:'Personal spending'},{name:'BarcLoan Hub',balance:0,initialBalance:0,rate:0,minPayment:650.18,notes:'Barclays fraud loan'},{name:'BarcLoan Waf',balance:0,initialBalance:0,rate:0,minPayment:650,notes:'Barclays fraud loan'},{name:'CPAWCO Loan',balance:0,initialBalance:0,rate:0,minPayment:272,notes:'Philippine loan'}];

// Barclays account number → who owns it
const ACCOUNT_MAP={'20-17-22 43623793':'Hub','20-26-86 90632368':'Joint','20-17-22 43370569':'Waf'};

// Income credit labels from Barclays → friendly name + category
const INCOME_MAPPINGS={'CAM UNI HOSP':{label:'Paycheck Waf Bank',cat:'Income',who:'Waf'},'ADDENBROOKES':{label:'Paycheck Waf Bank',cat:'Income',who:'Waf'},'NWLH NHS':{label:'Paycheck Hub Bank',cat:'Income',who:'Hub'},'NHS':{label:'Paycheck Bank',cat:'Income',who:'Hub'},'SALARY':{label:'Paycheck',cat:'Income',who:'Hub'},'WAGES':{label:'Paycheck',cat:'Income',who:'Hub'},'BACS CREDIT':{label:'Paycheck',cat:'Income',who:'Hub'}};

function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function getCurrentPeriodKey(){
  const now=new Date();const d=now.getDate();const m=now.getMonth()+1;const y=now.getFullYear();
  if(d>=25)return y+'-'+String(m).padStart(2,'0');
  const pm=m===1?12:m-1;const py=m===1?y-1:y;
  return py+'-'+String(pm).padStart(2,'0');
}

let state={
  mappings:load('mappings',DEFAULT_MAPPINGS),
  bills:load('bills',DEFAULT_BILLS),
  debts:load('debts',DEFAULT_DEBTS),
  periods:load('periods',{}),
  subs:load('subs',[]),
  savings:load('savings',[]),
  planIts:load('planIts',[]),
  currentPeriod:load('currentPeriod',getCurrentPeriodKey())
};

function getPeriodLabel(k){return(state.periods[k]&&state.periods[k].label)||k;}
function getOrCreatePeriod(k){
  if(!state.periods[k]){
    // Auto-generate label for new period
    const parts=k.split('-');
    if(parts.length===2){
      const y=parseInt(parts[0]);const m=parseInt(parts[1]);
      const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const em=m===12?1:m+1;const ey=m===12?y+1:y;
      state.periods[k]={label:months[m-1]+' '+y+' (25 '+months[m-1]+' – 24 '+months[em-1]+' '+ey+')',income:[],expenses:[],bills:[],debts:[],savings:[],transactions:[],extraIncome:[],extraExpenses:[],rollover:0};
    } else {
      state.periods[k]={income:[],expenses:[],bills:[],debts:[],savings:[],transactions:[],extraIncome:[],extraExpenses:[],rollover:0};
    }
    save('periods',state.periods);
  }
  return state.periods[k];
}



let activeTab='dashboard';
function showTab(t){
  activeTab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['dashboard','history','entry','import','bills','debts','planits','savings','settings'][i]===t);
  });
  render();
}

function periodSelect(){
  const periods=Object.keys(state.periods).sort();
  return`<select onchange="changePeriod(this.value)" style="font-size:12px;padding:4px 8px;border-radius:6px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a">${periods.map(pk=>`<option value="${pk}" ${pk===state.currentPeriod?'selected':''}>${getPeriodLabel(pk)}</option>`).join('')}</select>`;
}

function render(){
  document.getElementById('period-label').textContent=getPeriodLabel(state.currentPeriod);
  const el=document.getElementById('content');
  if(activeTab==='dashboard')el.innerHTML=renderDashboard();
  else if(activeTab==='history')el.innerHTML=renderHistory();
  else if(activeTab==='entry')el.innerHTML=renderEntry();
  else if(activeTab==='import')el.innerHTML=renderImport();
  else if(activeTab==='bills')el.innerHTML=renderBills();
  else if(activeTab==='debts')el.innerHTML=renderDebts();
  else if(activeTab==='planits')el.innerHTML=renderPlanIts();
  else if(activeTab==='savings')el.innerHTML=renderSavings();
  else if(activeTab==='settings')el.innerHTML=renderSettings();
}

function renderDashboard(){
  const t=calcPeriodTotals(state.currentPeriod);
  const p=getOrCreatePeriod(state.currentPeriod);
  const allExp=[...(p.expenses||[]),...(p.extraExpenses||[]),...(p.transactions||[]).filter(tx=>tx.cat!=='Income'&&tx.cat!=='Transfer')];
  const catBreakdown={};
  allExp.forEach(e=>{const c=e.cat||'Other';catBreakdown[c]=(catBreakdown[c]||0)+Number(e.amount||0);});
  if(t.totalBills>0)catBreakdown['Bills']=(catBreakdown['Bills']||0)+t.totalBills;
  if(t.totalDebt>0)catBreakdown['Debt']=(catBreakdown['Debt']||0)+t.totalDebt;
  if(t.totalSavings>0)catBreakdown['Savings']=(catBreakdown['Savings']||0)+t.totalSavings;
  const sortedCats=Object.entries(catBreakdown).sort((a,b)=>b[1]-a[1]);
  const maxCat=sortedCats[0]?sortedCats[0][1]:1;
  return`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div class="section-title" style="margin:0">Period overview</div>${periodSelect()}</div>
  <div class="metrics">
    <div class="metric"><div class="metric-label">Rollover</div><div class="metric-value">${fmt(t.rollover)}</div></div>
    <div class="metric"><div class="metric-label">Income</div><div class="metric-value positive">${fmt(t.totalIncome)}</div></div>
    <div class="metric"><div class="metric-label">Bills</div><div class="metric-value">${fmt(t.totalBills)}</div></div>
    <div class="metric"><div class="metric-label">Debt payments</div><div class="metric-value negative">${fmt(t.totalDebt)}</div></div>
    <div class="metric"><div class="metric-label">Other spending</div><div class="metric-value warning">${fmt(t.totalExp)}</div></div>
    <div class="metric"><div class="metric-label">Savings</div><div class="metric-value positive">${fmt(t.totalSavings)}</div></div>
    <div class="metric"><div class="metric-label">Remaining</div><div class="metric-value ${t.remaining>=0?'positive':'negative'}">${fmt(t.remaining)}</div></div>
  </div>
  <div class="card">
    <div class="card-title">Spending breakdown</div>
    ${sortedCats.length?sortedCats.map(([c,v])=>`<div class="bar-row"><div class="bar-label">${c}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxCat*100)}%;background:${BARCOLORS[c]||'#888780'}"></div></div><div class="bar-amount">${fmt(v)}</div></div>`).join(''):'<div class="empty">No spending data yet for this period.</div>'}
  </div>
  <div class="card">
    <div class="card-title">Debt snowball</div>
    ${(state.planIts||[]).length?`<div style="margin-bottom:12px"><div style="font-size:12px;color:#666;margin-bottom:8px;font-weight:500">PLAN IT / BNPL</div>${(state.planIts||[]).map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid rgba(0,0,0,0.07);font-size:13px"><span>${p.name} <span style="color:#666;font-size:11px">${p.item?'· '+p.item:''}</span></span><span style="color:#534AB7;font-weight:500">${fmt(p.monthlyPayment)}/mo · ${p.monthsRemaining} left</span></div>`).join('')}</div>`:''}
    ${state.debts.filter(d=>Number(d.balance||0)>0).length?state.debts.filter(d=>Number(d.balance||0)>0).sort((a,b)=>a.balance-b.balance).map((d,i)=>`
      <div class="debt-card">
        <div class="snowball-order">${i+1}</div>
        <div class="debt-info">
          <div class="debt-name">${d.name}</div>
          <div class="debt-meta">${d.notes||''} ${d.rate>0?'· '+d.rate+'% APR':''}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${d.initialBalance>0?Math.min(100,Math.round((d.initialBalance-d.balance)/d.initialBalance*100)):0}%"></div></div>
        </div>
        <div class="debt-balance"><div class="debt-balance-num">${fmt(d.balance)}</div><div class="debt-payment">min ${fmt(d.minPayment||0)}/mo</div></div>
      </div>`).join(''):'<div class="empty">Enter current debt balances in the Debts tab.</div>'}
  </div>`;
}

function renderHistory(){
  const periods=Object.keys(state.periods).sort();
  const incomeData=periods.map(k=>calcPeriodTotals(k).totalIncome);
  const debtData=periods.map(k=>calcPeriodTotals(k).totalDebt);
  const billsData=periods.map(k=>calcPeriodTotals(k).totalBills);
  const maxVal=Math.max(...incomeData,...debtData,...billsData,1);
  const chartH=160;const chartW=periods.length*90;
  const bars=periods.map((k,i)=>{
    const t=calcPeriodTotals(k);
    const x=i*90+5;const lbl=getPeriodLabel(k).split('(')[0].trim().replace(' 2025','').replace(' 2026','');
    const iH=Math.round(t.totalIncome/maxVal*chartH);const dH=Math.round(t.totalDebt/maxVal*chartH);const bH=Math.round(t.totalBills/maxVal*chartH);
    return`<rect x="${x}" y="${chartH-iH}" width="18" height="${iH}" fill="#639922" rx="2"/><rect x="${x+20}" y="${chartH-bH}" width="18" height="${bH}" fill="#378ADD" rx="2"/><rect x="${x+40}" y="${chartH-dH}" width="18" height="${dH}" fill="#E24B4A" rx="2"/><text x="${x+29}" y="${chartH+14}" text-anchor="middle" font-size="10" fill="#666">${lbl}</text>`;
  }).join('');
  const rows=periods.map(k=>{const t=calcPeriodTotals(k);return`<div class="history-row"><div style="font-size:12px;color:#666">${getPeriodLabel(k).split('(')[0].trim()}</div><div class="positive">${fmt(t.totalIncome)}</div><div>${fmt(t.totalBills)}</div><div class="negative">${fmt(t.totalDebt)}</div><div class="warning">${fmt(t.totalExp)}</div><div class="${t.remaining>=0?'positive':'negative'}">${fmt(t.remaining)}</div></div>`;}).join('');
  return`
  <div class="card">
    <div class="card-title">Monthly overview — all periods</div>
    <svg viewBox="0 0 ${Math.max(chartW,400)} ${chartH+30}" style="width:100%;overflow:visible">${bars}</svg>
    <div style="display:flex;gap:16px;margin-top:8px;font-size:12px;color:#666">
      <span><span style="display:inline-block;width:10px;height:10px;background:#639922;border-radius:2px;margin-right:4px"></span>Income</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#378ADD;border-radius:2px;margin-right:4px"></span>Bills</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#E24B4A;border-radius:2px;margin-right:4px"></span>Debt payments</span>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Period-by-period summary</div>
    <div class="history-row history-header"><div>Period</div><div>Income</div><div>Bills</div><div>Debt paid</div><div>Other exp</div><div>Remaining</div></div>
    ${rows}
  </div>`;
}

function renderEntry(){
  const p=getOrCreatePeriod(state.currentPeriod);
  const extra=p.extraIncome||[];const extraExp=p.extraExpenses||[];
  return`
  <div class="alert alert-info">Editing: <strong>${getPeriodLabel(state.currentPeriod)}</strong>. Historical data is pre-loaded — add anything not yet captured below.</div>
  <div class="card">
    <div class="card-title">Add income</div>
    <div class="form-row three"><div class="form-group"><label>Description</label><input id="inc-label" placeholder="e.g. Paycheck Hub, Bank shift…"></div><div class="form-group"><label>Who</label><select id="inc-who"><option>Hub</option><option>Waf</option><option>Joint</option><option>Other</option></select></div><div class="form-group"><label>Amount (£)</label><input id="inc-amount" type="number" placeholder="0.00" step="0.01"></div></div>
    <div class="btn-row"><button class="btn primary" onclick="addIncome()">Add income</button></div>

// Convert a DD/MM/YYYY date string to a period key YYYY-MM (paycheck 25th-24th)
function dateToPeriodKey(dateStr){
  if(!dateStr)return state.currentPeriod;
  const parts=dateStr.split('/');
  if(parts.length!==3)return state.currentPeriod;
  const day=parseInt(parts[0]);
  const month=parseInt(parts[1]);
  const year=parseInt(parts[2]);
  if(isNaN(day)||isNaN(month)||isNaN(year))return state.currentPeriod;
  // If day >= 25, period starts this month
  // If day <= 24, period started previous month
  if(day>=25){
    return year+'-'+String(month).padStart(2,'0');
  } else {
    // Period started previous month
    const pm=month===1?12:month-1;
    const py=month===1?year-1:year;
    return py+'-'+String(pm).padStart(2,'0');
  }
}

function handleCSV(input){
  const file=input.files[0];if(!file)return;
  const bank=document.getElementById('csv-bank').value;
  const reader=new FileReader();
  reader.onload=e=>{
    const txs=parseCSV(e.target.result,bank);
    // Auto-split transactions into correct periods by date
    const periodCounts={};
    txs.forEach(t=>{
      const periodKey=dateToPeriodKey(t.date);
      const p=getOrCreatePeriod(periodKey);
      if(!p.transactions)p.transactions=[];
      const m=applyMapping(t.rawLabel);
      if(m){t.label=m.label;t.cat=m.cat;}
      else{t.label=t.rawLabel;t.cat=t.amexCat||'Unknown';}
      t._idx=p.transactions.length;
      p.transactions.push(t);
      periodCounts[periodKey]=(periodCounts[periodKey]||0)+1;
    });
    save('periods',state.periods);
    // Show summary of what was imported where
    const summary=Object.entries(periodCounts).sort().map(([k,n])=>getPeriodLabel(k)+': '+n+' transactions').join('\n');
    if(summary)alert('Imported and split across periods:\n\n'+summary);
    render();
  };
  reader.readAsText(file);input.value='';
}

function parseCSV(text,bank){
  const lines=text.split('\n').filter(l=>l.trim());
  const txs=[];
  if(bank==='barclays'){
    // Barclays format: Number, Date, Account, Amount, Subcategory, Memo
    for(let i=1;i<lines.length;i++){
      const cols=parseLine(lines[i]);
      if(cols.length<4)continue;
      const date=cols[1]?.trim();
      const account=(cols[2]||'').trim();
      const amtRaw=parseFloat((cols[3]||'').replace(/[^0-9.-]/g,''));
      const subcategory=(cols[4]||'').trim();
      const rawLabel=(cols[5]||'').split('\t')[0].trim();
      if(!rawLabel||isNaN(amtRaw)||amtRaw===0)continue;
      const who=ACCOUNT_MAP[account]||'Unknown';
      const isCredit=amtRaw>0;
      const amount=Math.abs(amtRaw);
      if(isCredit){
        // Import income credits — check income mappings first
        let incLabel=rawLabel;let incCat='Income';let incWho=who;
        for(const[k,v]of Object.entries(INCOME_MAPPINGS)){
          if(rawLabel.toUpperCase().includes(k)){incLabel=v.label+' ('+who+')';incWho=v.who||who;break;}
        }
        // Skip internal Funds Transfers between own Barclays accounts
        if(subcategory==='Funds Transfer')continue;
        txs.push({date,rawLabel,amount,label:incLabel,cat:'Income',who:incWho,account,subcategory,isCredit:true,_idx:0});
      } else {
        // Debit — expense
        txs.push({date,rawLabel,amount,label:rawLabel,cat:'Unknown',who,account,subcategory,isCredit:false,_idx:0});
      }
    }
  } else {
    // Amex format: Date, Description, Card Member, Account #, Amount, Extended Details, Appears On Your Statement As, ..., Category
    for(let i=1;i<lines.length;i++){
      const cols=parseLine(lines[i]);
      const date=cols[0]?.trim();
      const rawLabel=(cols[1]||'').trim();
      const cardMember=(cols[2]||'').trim();
      const amtRaw=parseFloat((cols[4]||'').replace(/[^0-9.-]/g,''));
      const amexCatRaw=(cols[12]||'').trim();
      const amexCat=AMEX_CAT_MAP[amexCatRaw]||'';
      // Skip payments received (negative amounts) and blank labels
      if(!rawLabel||isNaN(amtRaw)||amtRaw<=0)continue;
      // Skip "PAYMENT RECEIVED" entries
      if(rawLabel.toUpperCase().includes('PAYMENT RECEIVED'))continue;
      // Label includes card member name to distinguish Hub vs Waf spending
      const memberTag=cardMember.split(' ')[0];
      const labelWithMember=rawLabel+' ('+memberTag+')';
      txs.push({date,rawLabel:rawLabel,amount:amtRaw,label:labelWithMember,amexCat,cat:'Unknown',cardMember,_idx:0});
    }
  }
  return txs;
}
function parseLine(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){if(l[i]==='"')q=!q;else if(l[i]===','&&!q){r.push(c);c='';}else c+=l[i];}r.push(c);return r;}
function applyMapping(raw){const lo=raw.toLowerCase();for(const[k,v]of Object.entries(state.mappings))if(lo.includes(k.toLowerCase()))return v;return null;}
function findTxAcrossPeriods(idx,periodKey){
  // Search in given period first, then all periods
  const keys=periodKey?[periodKey,...Object.keys(state.periods).filter(k=>k!==periodKey)]:Object.keys(state.periods);
  for(const k of keys){const p=state.periods[k];if(p&&p.transactions){const t=p.transactions.find(t=>t._idx===idx);if(t)return{t,k};}}
  return null;
}
function setTxLabel(idx,field,val){
  const found=findTxAcrossPeriods(idx,state.currentPeriod);
  if(found)found.t[field]=val;
  save('periods',state.periods);
}
function learnMapping(idx){const found=findTxAcrossPeriods(idx,state.currentPeriod);if(!found||!found.t.cat||found.t.cat==='Unknown')return alert('Pick a category first.');const t=found.t;state.mappings[t.rawLabel.substring(0,20)]={label:t.label,cat:t.cat};save('mappings',state.mappings);render();}
function delTx(idx){const found=findTxAcrossPeriods(idx,state.currentPeriod);if(found){state.periods[found.k].transactions=state.periods[found.k].transactions.filter(t=>t._idx!==idx);}save('periods',state.periods);render();}
function addBill(){const name=document.getElementById('bill-name').value.trim();const amount=parseFloat(document.getElementById('bill-amount').value);const day=parseInt(document.getElementById('bill-day').value)||0;if(!name||isNaN(amount))return alert('Enter name and amount.');state.bills.push({name,amount,day,cat:'Bills'});save('bills',state.bills);render();}
function delBill(i){state.bills.splice(i,1);save('bills',state.bills);render();}
function addDebt(){const name=document.getElementById('debt-name').value.trim();const balance=parseFloat(document.getElementById('debt-balance').value)||0;const rate=parseFloat(document.getElementById('debt-rate').value)||0;const minPayment=parseFloat(document.getElementById('debt-min').value)||0;const notes=document.getElementById('debt-notes').value.trim();if(!name)return alert('Enter a debt name.');const i=state.debts.findIndex(d=>d.name===name);if(i>=0){if(!state.debts[i].initialBalance&&balance>0)state.debts[i].initialBalance=balance;Object.assign(state.debts[i],{balance,rate,minPayment,notes});}else state.debts.push({name,balance,rate,minPayment,notes,initialBalance:balance});save('debts',state.debts);render();}
function delDebt(name){state.debts=state.debts.filter(d=>d.name!==name);save('debts',state.debts);render();}
function addSaving(){const name=document.getElementById('sv-name').value.trim();const goal=parseFloat(document.getElementById('sv-goal').value)||0;const saved=parseFloat(document.getElementById('sv-saved').value)||0;const platform=document.getElementById('sv-platform').value.trim();if(!name)return alert('Enter a goal name.');state.savings.push({name,goal,saved,platform});save('savings',state.savings);render();}
function delSaving(i){state.savings.splice(i,1);save('savings',state.savings);render();}
function addSub(){const name=document.getElementById('sub-name').value.trim();const amount=parseFloat(document.getElementById('sub-amount').value)||0;const cycle=document.getElementById('sub-cycle').value;if(!name||!amount)return alert('Enter name and amount.');state.subs.push({name,amount,cycle});save('subs',state.subs);render();}
function delSub(i){state.subs.splice(i,1);save('subs',state.subs);render();}
function addMapping(){const raw=document.getElementById('map-raw').value.trim();const label=document.getElementById('map-label').value.trim();const cat=document.getElementById('map-cat').value;if(!raw||!label)return alert('Fill in both fields.');state.mappings[raw]={label,cat};save('mappings',state.mappings);render();}
function delMapping(key){delete state.mappings[key];save('mappings',state.mappings);render();}
function exportData(){const blob=new Blob([JSON.stringify({mappings:state.mappings,bills:state.bills,debts:state.debts,periods:state.periods,subs:state.subs,savings:state.savings,planIts:state.planIts||[]},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hub-waf-budget-backup.json';a.click();}
function importData(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.mappings)state.mappings=d.mappings;if(d.bills)state.bills=d.bills;if(d.debts)state.debts=d.debts;if(d.periods)state.periods=d.periods;if(d.subs)state.subs=d.subs;if(d.savings)state.savings=d.savings;if(d.planIts)state.planIts=d.planIts;save('mappings',state.mappings);save('bills',state.bills);save('debts',state.debts);save('periods',state.periods);save('subs',state.subs);save('savings',state.savings);render();}catch(e){alert('Invalid JSON file.');}};reader.readAsText(file);input.value='';}
function clearAll(){localStorage.clear();location.reload();}

render();
</script>
