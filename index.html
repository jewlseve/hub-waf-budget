<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub & Waf Budget</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:15px;color:#1a1a1a;background:#f5f5f0;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.12);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:16px;font-weight:500}
.period-badge{font-size:12px;color:#666;background:#f0efea;padding:4px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.12)}
.tabs{display:flex;gap:2px;padding:10px 20px 0;background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.12);overflow-x:auto}
.tab{padding:8px 12px;border-radius:6px 6px 0 0;font-size:13px;cursor:pointer;border:none;background:none;color:#666;white-space:nowrap;border-bottom:2px solid transparent;font-family:inherit}
.tab.active{color:#1a1a1a;font-weight:500;border-bottom:2px solid #1a1a1a}
.content{padding:20px;flex:1;max-width:960px;margin:0 auto;width:100%}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:16px 20px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:600;color:#888;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.06em}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.metric{background:#f5f5f0;border-radius:8px;padding:12px 14px}
.metric-label{font-size:11px;color:#888;margin-bottom:4px}
.metric-value{font-size:19px;font-weight:500}
.green{color:#0F6E56}.red{color:#A32D2D}.amber{color:#854F0B}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{width:140px;color:#888;text-align:right;flex-shrink:0;font-size:12px}
.bar-track{flex:1;height:8px;background:#f0efea;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-amt{width:80px;text-align:right;font-size:13px;font-variant-numeric:tabular-nums}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.three{grid-template-columns:2fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;color:#666}
.fg input,.fg select{font-size:14px;padding:8px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a;width:100%;font-family:inherit}
.btn{padding:8px 16px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;font-family:inherit}
.btn:hover{background:#f5f5f0}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.primary:hover{opacity:0.85}
.btn.danger{color:#A32D2D;border-color:#F7C1C1;font-size:12px;padding:4px 10px}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;font-weight:500;color:#888;border-bottom:0.5px solid rgba(0,0,0,0.1);font-size:11px;text-transform:uppercase}
.tbl td{padding:8px 10px;border-bottom:0.5px solid rgba(0,0,0,0.06);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafaf8}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.b-bills{background:#E6F1FB;color:#0C447C}
.b-debt{background:#FCEBEB;color:#791F1F}
.b-income{background:#EAF3DE;color:#27500A}
.b-savings{background:#E1F5EE;color:#085041}
.b-transfer{background:#EEEDFE;color:#3C3489}
.b-other{background:#f0efea;color:#666}
.hr{border:none;border-top:0.5px solid rgba(0,0,0,0.08);margin:14px 0}
.empty{text-align:center;padding:32px 20px;color:#999;font-size:13px}
.pbar{height:8px;background:#f0efea;border-radius:6px;overflow:hidden;margin:6px 0}
.pbar-fill{height:100%;border-radius:6px;background:#1D9E75}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-info{background:#E6F1FB;color:#0C447C;border:0.5px solid #B5D4F4}
.alert-warn{background:#FAEEDA;color:#633806;border:0.5px solid #FAC775}
.dcard{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:0.5px solid rgba(0,0,0,0.06)}
.dcard:last-child{border-bottom:none}
.dcard-info{flex:1;min-width:0}
.dcard-name{font-weight:500;font-size:14px}
.dcard-meta{font-size:12px;color:#888;margin-top:2px}
.dcard-right{text-align:right;min-width:100px;flex-shrink:0}
.dcard-bal{font-size:16px;font-weight:500;color:#A32D2D}
.dcard-sub{font-size:12px;color:#888;margin-top:2px}
.upload-zone{border:1px dashed rgba(0,0,0,0.2);border-radius:12px;padding:28px;text-align:center;cursor:pointer;color:#888;font-size:13px;margin-bottom:12px}
.upload-zone:hover{background:#f5f5f0}
.snowball-n{font-size:11px;color:#666;background:#f0efea;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600}
.hist-row{display:grid;grid-template-columns:130px 1fr 1fr 1fr 1fr 1fr;gap:8px;padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,0.06);font-size:13px;align-items:center}
.hist-row:last-child{border-bottom:none}
.hist-hdr{font-weight:600;font-size:11px;color:#888;text-transform:uppercase}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1>Hub &amp; Waf Budget</h1>
  <span class="period-badge" id="period-label">Loading...</span>
</div>
<div class="tabs" id="nav">
  <button class="tab active" onclick="go('dashboard')">Dashboard</button>
  <button class="tab" onclick="go('history')">History</button>
  <button class="tab" onclick="go('entry')">Add Data</button>
  <button class="tab" onclick="go('import')">Import CSV</button>
  <button class="tab" onclick="go('bills')">Bills</button>
  <button class="tab" onclick="go('debts')">Debts</button>
  <button class="tab" onclick="go('planits')">Plan It / BNPL</button>
  <button class="tab" onclick="go('savings')">Savings &amp; Subs</button>
  <button class="tab" onclick="go('settings')">Settings</button>
</div>
<div class="content" id="app"></div>
</div>
<script>
const CATS=['Income','Bills','Debt','Groceries','Dining','Travel','Clothing','Shopping','Home','Entertainment','Health','Personal Care','Work Expenses','Remittance','Savings','Transfer','Other'];
const BARCOL={Bills:'#378ADD',Debt:'#E24B4A',Groceries:'#4C9A2A',Dining:'#BA7517',Travel:'#534AB7',Clothing:'#D4537E',Shopping:'#E8873A',Entertainment:'#1D9E75',Other:'#888780',Remittance:'#D85A30','Work Expenses':'#5DCAA5',Home:'#7F77DD','Personal Care':'#EF9F27',Health:'#22A870',Savings:'#1D9E75',Income:'#4C9A2A'};
const ACC_MAP={'20-17-22 43623793':'Hub','20-26-86 90632368':'Joint','20-17-22 43370569':'Waf'};
const INC_MAP={'CAM UNI HOSP':{label:'Paycheck Waf Bank',who:'Waf'},'ADDENBROOKES':{label:'Paycheck Waf Bank',who:'Waf'},'NWLH NHS':{label:'Paycheck Hub Bank',who:'Hub'},'NHS TRUST':{label:'Paycheck Bank',who:'Hub'},'NHS ':{label:'Paycheck Bank',who:'Hub'},'SALARY':{label:'Paycheck',who:'Hub'},'WAGES':{label:'Paycheck',who:'Hub'}};
const AMEX_CAT={'Entertainment-Restaurants':'Dining','Entertainment-Bars & Cafes':'Dining','Entertainment-Sports Events':'Entertainment','General Purchases-Groceries':'Groceries','General Purchases-Pharmacies':'Health','General Purchases-Clothing Stores':'Clothing','General Purchases-Computer Supplies':'Shopping','General Purchases-Wholesale Stores':'Groceries','General Purchases-Online Purchases':'Shopping'};
const DEFAULT_MAPS={'Cooke Curtis':{label:'Rent',cat:'Bills'},'Novuna Personal':{label:'Furniture Village',cat:'Bills'},'EE Limited':{label:'EE (SIM)',cat:'Bills'},'EE Ltd':{label:'EE Broadband',cat:'Bills'},'Scdc':{label:'Council Tax',cat:'Bills'},'Barclayloan':{label:'BarcLoan Waf',cat:'Debt'},'Bloan':{label:'BarcLoan Hub',cat:'Debt'},'B/Card Forward':{label:'Barclaycard Waf',cat:'Debt'},'Mr Rene Inapan':{label:'Barclaycard Hub',cat:'Debt'},'One Utility Bill':{label:'Electricity',cat:'Bills'},'AMERICAN EXP':{label:'Amex Payment',cat:'Transfer'},'PAYMENT RECEIVED':{label:'Amex Payment Received',cat:'Transfer'},'INSTALMENT PLAN FEE':{label:'Plan It Fee',cat:'Debt'},'AMOUNT TRANSFERRED FROM CREDIT':{label:'Plan It Transfer',cat:'Transfer'},'Amazon Prime':{label:'Amazon Prime',cat:'Bills'},'Disney':{label:'Disney+',cat:'Bills'},'Adobe':{label:'Adobe',cat:'Bills'},'Vitality':{label:'Vitality Insurance',cat:'Bills'},'Microsoft':{label:'Microsoft 365',cat:'Bills'},'Tesco':{label:'Tesco',cat:'Groceries'},'Sainsbury':{label:"Sainsbury's",cat:'Groceries'},'Lidl':{label:'Lidl',cat:'Groceries'},'Aldi':{label:'Aldi',cat:'Groceries'},'Co-op':{label:'Co-op',cat:'Groceries'},'Marks Spencer':{label:'M&S',cat:'Groceries'},'Deliveroo':{label:'Deliveroo',cat:'Dining'},'Just Eat':{label:'Just Eat',cat:'Dining'},'Uber Eats':{label:'Uber Eats',cat:'Dining'},'Compass Group':{label:'Compass (Canteen)',cat:'Dining'},'Trainline':{label:'Trainline',cat:'Travel'},'National Rail':{label:'National Rail',cat:'Travel'},'Stagecoach':{label:'Stagecoach',cat:'Travel'},'Spotify':{label:'Spotify',cat:'Entertainment'},'Netflix':{label:'Netflix',cat:'Entertainment'},'Tenpin':{label:'Tenpin Bowling',cat:'Entertainment'},'Wildlife Trust':{label:'Wildlife Trust',cat:'Bills'}};
const DEFAULT_BILLS=[{name:'Rent',amount:1425,day:21},{name:'Council Tax',amount:192,day:8},{name:'Electricity',amount:250.73,day:7},{name:'EE (SIM)',amount:67.78,day:28},{name:'EE Broadband',amount:44.99,day:21},{name:'Furniture Village',amount:78.30,day:0},{name:'Vitality Insurance',amount:55.14,day:0},{name:'Amazon Prime',amount:8.99,day:27},{name:'Microsoft 365',amount:14.99,day:22},{name:'Disney+',amount:2.50,day:0},{name:'Adobe',amount:9.98,day:0},{name:'Wildlife Trust',amount:2.50,day:6},{name:"SOS Children's Village",amount:16.12,day:0},{name:'HP Instant Ink',amount:1.50,day:0},{name:'Water',amount:181,day:0},{name:'Apple Watch (Hub)',amount:7.50,day:0}];
const DEFAULT_DEBTS=[{name:'Amex',balance:0,initialBalance:0,rate:22.9,minPayment:1500,notes:'Travel & groceries card'},{name:'Barclaycard Hub',balance:0,initialBalance:0,rate:0,minPayment:250,notes:'Personal spending'},{name:'Barclaycard Waf',balance:0,initialBalance:0,rate:0,minPayment:400,notes:'Personal spending'},{name:'BarcLoan Hub',balance:0,initialBalance:0,rate:0,minPayment:650.18,notes:'Barclays fraud loan'},{name:'BarcLoan Waf',balance:0,initialBalance:0,rate:0,minPayment:650,notes:'Barclays fraud loan'},{name:'CPAWCO Loan',balance:0,initialBalance:0,rate:0,minPayment:272,notes:'Philippine loan'}];

function ld(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function curKey(){const n=new Date(),d=n.getDate(),m=n.getMonth()+1,y=n.getFullYear();if(d>=25)return y+'-'+String(m).padStart(2,'0');const pm=m===1?12:m-1,py=m===1?y-1:y;return py+'-'+String(pm).padStart(2,'0');}
function dateToPeriod(ds){if(!ds)return S.cur;const p=ds.split('/');if(p.length!==3)return S.cur;const d=+p[0],m=+p[1],y=+p[2];if(isNaN(d)||isNaN(m)||isNaN(y))return S.cur;if(d>=25)return y+'-'+String(m).padStart(2,'0');const pm=m===1?12:m-1,py=m===1?y-1:y;return py+'-'+String(pm).padStart(2,'0');}
function pLabel(k){if(S.periods[k]&&S.periods[k].label)return S.periods[k].label;if(!k||!k.includes('-'))return k||'';const[y,m]=k.split('-').map(Number);const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];const em=m===12?1:m+1,ey=m===12?y+1:y;return MO[m-1]+' '+y+' (24 '+MO[m-1]+' - 24 '+MO[em-1]+' '+ey+')';}
function pShort(k){if(!k||!k.includes('-'))return k||'';const[y,m]=k.split('-').map(Number);const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return MO[m-1]+' '+y;}
function getP(k){if(!S.periods[k])S.periods[k]={label:pLabel(k),income:[],expenses:[],bills:[],debts:[],savings:[],transactions:[],extraIncome:[],extraExpenses:[],rollover:0};return S.periods[k];}

const S={maps:ld('maps',DEFAULT_MAPS),bills:ld('bills',DEFAULT_BILLS),debts:ld('debts',DEFAULT_DEBTS),periods:ld('periods',{}),subs:ld('subs',[]),savings:ld('savings',[]),planIts:ld('planIts',[]),cur:ld('cur',curKey())};

const fmt=n=>'£'+Math.abs(Number(n)||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});
function cb(c){const cls={Bills:'b-bills',Debt:'b-debt',Income:'b-income',Savings:'b-savings',Transfer:'b-transfer'}[c]||'b-other';return '<span class="badge '+cls+'">'+( c||'Other')+'</span>';}
function ord(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function applyMap(raw){const lo=raw.toLowerCase();for(const[k,v]of Object.entries(S.maps))if(lo.includes(k.toLowerCase()))return v;return null;}
function calcT(k){const p=getP(k);const txInc=(p.transactions||[]).filter(t=>t.cat==='Income').reduce((s,t)=>s+Number(t.amount||0),0);const manInc=[...(p.income||[]),...(p.extraIncome||[])].reduce((s,i)=>s+Number(i.amount||0),0);const totalIncome=txInc+manInc;const totalBills=(p.bills||[]).reduce((s,b)=>s+Number(b.amount||0),0);const totalDebt=(p.debts||[]).reduce((s,d)=>s+Number(d.amount||0),0);const totalSavings=(p.savings||[]).reduce((s,sv)=>s+Number(sv.amount||0),0);const txExp=(p.transactions||[]).filter(t=>t.cat!=='Income'&&t.cat!=='Transfer').reduce((s,t)=>s+Number(t.amount||0),0);const manExp=[...(p.expenses||[]),...(p.extraExpenses||[])].reduce((s,e)=>s+Number(e.amount||0),0);const totalExp=txExp+manExp;const remaining=(p.rollover||0)+totalIncome-totalBills-totalDebt-totalSavings-totalExp;return{totalIncome,totalBills,totalDebt,totalSavings,totalExp,remaining,rollover:p.rollover||0};}
function pSel(){const keys=Object.keys(S.periods).sort().reverse();if(!keys.includes(S.cur))keys.unshift(S.cur);return '<select onchange="chgP(this.value)" style="font-size:12px;padding:4px 8px;border-radius:6px;border:0.5px solid rgba(0,0,0,0.18);background:#fff">'+keys.map(k=>'<option value="'+k+'"'+(k===S.cur?' selected':'')+'>'+pLabel(k)+'</option>').join('')+'</select>';}

let tab='dashboard';
function go(t){tab=t;document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',['dashboard','history','entry','import','bills','debts','planits','savings','settings'][i]===t);});render();}

function render(){
  document.getElementById('period-label').textContent=pLabel(S.cur);
  const el=document.getElementById('app');
  const fns={dashboard:rDash,history:rHist,entry:rEntry,import:rImport,bills:rBills,debts:rDebts,planits:rPlanIts,savings:rSavings,settings:rSettings};
  try{el.innerHTML=(fns[tab]||rDash)();}
  catch(e){el.innerHTML='<div class="card"><div class="empty">Error loading tab: '+e.message+'</div></div>';console.error(e);}
}

function rDash(){
  const t=calcT(S.cur),p=getP(S.cur);
  const allTx=[...(p.transactions||[]).filter(x=>x.cat!=='Income'&&x.cat!=='Transfer'),...(p.expenses||[]),...(p.extraExpenses||[])];
  const cm={};allTx.forEach(x=>{const c=x.cat||'Other';cm[c]=(cm[c]||0)+Number(x.amount||0);});
  if(t.totalBills>0)cm.Bills=(cm.Bills||0)+t.totalBills;
  if(t.totalDebt>0)cm.Debt=(cm.Debt||0)+t.totalDebt;
  if(t.totalSavings>0)cm.Savings=(cm.Savings||0)+t.totalSavings;
  const cats=Object.entries(cm).sort((a,b)=>b[1]-a[1]);
  const mx=cats[0]?cats[0][1]:1;
  const ad=S.debts.filter(d=>Number(d.balance||0)>0).sort((a,b)=>a.balance-b.balance);
  const ap=(S.planIts||[]).filter(p=>Number(p.monthsRemaining||0)>0);
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div style="font-size:15px;font-weight:500">Period overview</div>'+pSel()+'</div>'+
  '<div class="metrics"><div class="metric"><div class="metric-label">Rollover</div><div class="metric-value">'+fmt(t.rollover)+'</div></div><div class="metric"><div class="metric-label">Income</div><div class="metric-value green">'+fmt(t.totalIncome)+'</div></div><div class="metric"><div class="metric-label">Bills</div><div class="metric-value">'+fmt(t.totalBills)+'</div></div><div class="metric"><div class="metric-label">Debt payments</div><div class="metric-value red">'+fmt(t.totalDebt)+'</div></div><div class="metric"><div class="metric-label">Other spending</div><div class="metric-value amber">'+fmt(t.totalExp)+'</div></div><div class="metric"><div class="metric-label">Savings</div><div class="metric-value green">'+fmt(t.totalSavings)+'</div></div><div class="metric"><div class="metric-label">Remaining</div><div class="metric-value '+(t.remaining>=0?'green':'red')+'">'+fmt(t.remaining)+'</div></div></div>'+
  '<div class="card"><div class="card-title">Spending breakdown</div>'+(cats.length?cats.map(([c,v])=>'<div class="bar-row"><div class="bar-label">'+c+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(v/mx*100)+'%;background:'+(BARCOL[c]||'#888')+'"></div></div><div class="bar-amt">'+fmt(v)+'</div></div>').join(''):'<div class="empty">No spending data yet. Import CSVs to populate.</div>')+'</div>'+
  '<div class="card"><div class="card-title">Debt snowball &amp; Plan Its</div>'+(ap.length?'<div style="margin-bottom:12px">'+ap.map(pl=>'<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,0.05);font-size:13px"><span>'+pl.name+' <span style="color:#888;font-size:11px">'+(pl.item?'· '+pl.item:'')+'</span></span><span style="color:#534AB7;font-weight:500">'+fmt(pl.monthlyPayment)+'/mo · '+pl.monthsRemaining+'mo left</span></div>').join('')+'</div>':'')+
  (ad.length?ad.map((d,i)=>'<div class="dcard"><div class="snowball-n">'+(i+1)+'</div><div class="dcard-info"><div class="dcard-name">'+d.name+'</div><div class="dcard-meta">'+(d.notes||'')+' '+(d.rate>0?'· '+d.rate+'% APR':'')+'</div><div class="pbar"><div class="pbar-fill" style="width:'+(d.initialBalance>0?Math.min(100,Math.round((d.initialBalance-d.balance)/d.initialBalance*100)):0)+'%"></div></div></div><div class="dcard-right"><div class="dcard-bal">'+fmt(d.balance)+'</div><div class="dcard-sub">min '+fmt(d.minPayment||0)+'/mo</div></div></div>').join(''):'<div class="empty">Enter debt balances in the Debts tab to activate snowball tracking.</div>')+'</div>';
}

function rHist(){
  const keys=Object.keys(S.periods).sort();
  if(!keys.length)return '<div class="card"><div class="empty">No data yet. Import CSVs to see history.</div></div>';
  const iD=keys.map(k=>calcT(k).totalIncome),dD=keys.map(k=>calcT(k).totalDebt),bD=keys.map(k=>calcT(k).totalBills);
  const mx=Math.max(...iD,...dD,...bD,1);const H=140,W=keys.length*80;
  const bars=keys.map((k,i)=>{const t=calcT(k),x=i*80+6;const iH=Math.round(t.totalIncome/mx*H),dH=Math.round(t.totalDebt/mx*H),bH=Math.round(t.totalBills/mx*H);return'<rect x="'+x+'" y="'+(H-iH)+'" width="16" height="'+iH+'" fill="#4C9A2A" rx="2"/><rect x="'+(x+18)+'" y="'+(H-bH)+'" width="16" height="'+bH+'" fill="#378ADD" rx="2"/><rect x="'+(x+36)+'" y="'+(H-dH)+'" width="16" height="'+dH+'" fill="#E24B4A" rx="2"/><text x="'+(x+25)+'" y="'+(H+14)+'" text-anchor="middle" font-size="10" fill="#888">'+pShort(k)+'</text>';}).join('');
  return '<div class="card"><div class="card-title">All periods</div><svg viewBox="0 0 '+Math.max(W,360)+' '+(H+26)+'" style="width:100%;overflow:visible">'+bars+'</svg><div style="display:flex;gap:16px;margin-top:8px;font-size:12px;color:#888"><span><span style="display:inline-block;width:10px;height:10px;background:#4C9A2A;border-radius:2px;margin-right:4px"></span>Income</span><span><span style="display:inline-block;width:10px;height:10px;background:#378ADD;border-radius:2px;margin-right:4px"></span>Bills</span><span><span style="display:inline-block;width:10px;height:10px;background:#E24B4A;border-radius:2px;margin-right:4px"></span>Debt</span></div></div>'+

function handleCSV(input){
  const file=input.files[0];if(!file)return;
  const bank=document.getElementById('csvB').value;
  const reader=new FileReader();
  reader.onload=e=>{
    const txs=parseCSV(e.target.result,bank);
    const counts={};
    txs.forEach(t=>{
      const pk=dateToPeriod(t.date);
      const p=getP(pk);
      if(!p.transactions)p.transactions=[];
      const m=applyMap(t.rawLabel);
      if(m){t.label=m.label;t.cat=m.cat;}
      else if(t.cat!=='Income'){t.label=t.rawLabel;t.cat='Unknown';}
      t._idx=p.transactions.length;
      p.transactions.push(t);
      counts[pk]=(counts[pk]||0)+1;
    });
    sv('periods',S.periods);
    const sum=Object.entries(counts).sort().map(([k,n])=>pShort(k)+': '+n).join('\n');
    if(sum)alert('Imported and sorted:\n\n'+sum);
    render();
  };
  reader.readAsText(file);input.value='';
}

function parseCSV(text,bank){
  const lines=text.split('\n').filter(l=>l.trim());const txs=[];
  if(bank==='barclays'){
    for(let i=1;i<lines.length;i++){
      const c=pL(lines[i]);if(c.length<4)continue;
      const date=c[1]?.trim(),acc=(c[2]||'').trim(),amtRaw=parseFloat((c[3]||'').replace(/[^0-9.-]/g,'')),sub=(c[4]||'').trim(),rawLabel=(c[5]||'').split('\t')[0].trim();
      if(!rawLabel||isNaN(amtRaw)||amtRaw===0)continue;
      const who=ACC_MAP[acc]||'Unknown',isCredit=amtRaw>0,amount=Math.abs(amtRaw);
      if(isCredit){
        if(sub==='Funds Transfer')continue;
        let incLabel=rawLabel,incWho=who;
        for(const[k,v]of Object.entries(INC_MAP)){if(rawLabel.toUpperCase().includes(k)){incLabel=v.label+' ('+who+')';incWho=v.who||who;break;}}
        txs.push({date,rawLabel,amount,label:incLabel,cat:'Income',who:incWho,acc,_idx:0});
      } else {
        txs.push({date,rawLabel,amount,label:rawLabel,cat:'Unknown',who,acc,_idx:0});
      }
    }
  } else {
    for(let i=1;i<lines.length;i++){
      const c=pL(lines[i]);
      const date=c[0]?.trim(),rawLabel=(c[1]||'').trim(),member=(c[2]||'').trim(),amtRaw=parseFloat((c[4]||'').replace(/[^0-9.-]/g,'')),amexCatRaw=(c[12]||'').trim(),amexCat=AMEX_CAT[amexCatRaw]||'';
      if(!rawLabel||isNaN(amtRaw)||amtRaw<=0)continue;
      if(rawLabel.toUpperCase().includes('PAYMENT RECEIVED'))continue;
      const who=member.split(' ')[0];
      txs.push({date,rawLabel,amount:amtRaw,label:rawLabel+' ('+who+')',cat:amexCat||'Unknown',who,cardMember:member,_idx:0});
    }
  }
  return txs;
}
function pL(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){if(l[i]==='"')q=!q;else if(l[i]===','&&!q){r.push(c);c='';}else c+=l[i];}r.push(c);return r;}

function findT(idx,pk){const keys=pk?[pk,...Object.keys(S.periods).filter(k=>k!==pk)]:Object.keys(S.periods);for(const k of keys){const p=S.periods[k];if(p&&p.transactions){const t=p.transactions.find(t=>t._idx===idx);if(t)return{t,k};}}return null;}
function setTx(idx,field,val,pk){const f=findT(idx,pk);if(f)f.t[field]=val;sv('periods',S.periods);}
function learnMap(idx,pk){const f=findT(idx,pk);if(!f||!f.t.cat||f.t.cat==='Unknown')return alert('Pick a category first.');S.maps[f.t.rawLabel.substring(0,20)]={label:f.t.label,cat:f.t.cat};sv('maps',S.maps);render();}
function delTx(idx,pk){const f=findT(idx,pk);if(f)S.periods[f.k].transactions=S.periods[f.k].transactions.filter(t=>t._idx!==idx);sv('periods',S.periods);render();}
function clrPTx(k){if(confirm('Clear imports for '+pShort(k)+'?')){S.periods[k].transactions=[];sv('periods',S.periods);render();}}

function addBill(){const n=document.getElementById('bN').value.trim(),a=parseFloat(document.getElementById('bA').value),d=parseInt(document.getElementById('bD').value)||0;if(!n||isNaN(a))return alert('Enter name and amount.');S.bills.push({name:n,amount:a,day:d});sv('bills',S.bills);render();}
function delBill(i){S.bills.splice(i,1);sv('bills',S.bills);render();}

function addDebt(){const n=document.getElementById('dN').value.trim(),b=parseFloat(document.getElementById('dB').value)||0,r=parseFloat(document.getElementById('dR').value)||0,m=parseFloat(document.getElementById('dM').value)||0,x=document.getElementById('dX').value.trim();if(!n)return alert('Enter a debt name.');const i=S.debts.findIndex(d=>d.name===n);if(i>=0){if(!S.debts[i].initialBalance&&b>0)S.debts[i].initialBalance=b;Object.assign(S.debts[i],{balance:b,rate:r,minPayment:m,notes:x});}else S.debts.push({name:n,balance:b,initialBalance:b,rate:r,minPayment:m,notes:x});sv('debts',S.debts);render();}
function delDebt(n){S.debts=S.debts.filter(d=>d.name!==n);sv('debts',S.debts);render();}

function addPI(){const n=document.getElementById('piN').value.trim(),item=document.getElementById('piI').value.trim(),t=parseFloat(document.getElementById('piT').value)||0,p=parseFloat(document.getElementById('piP').value)||0,m=parseInt(document.getElementById('piM').value)||0,e=document.getElementById('piE').value,x=document.getElementById('piX').value.trim();if(!n||!p)return alert('Enter a name and monthly payment.');if(!S.planIts)S.planIts=[];S.planIts.push({name:n,item,total:t,monthlyPayment:p,monthsRemaining:m,endDate:e,notes:x});sv('planIts',S.planIts);render();}
function delPI(i){S.planIts.splice(i,1);sv('planIts',S.planIts);render();}

function addSV(){const n=document.getElementById('svN').value.trim(),g=parseFloat(document.getElementById('svG').value)||0,s=parseFloat(document.getElementById('svS').value)||0,p=document.getElementById('svP').value.trim();if(!n)return alert('Enter a goal name.');S.savings.push({name:n,goal:g,saved:s,platform:p});sv('savings',S.savings);render();}
function delSV(i){S.savings.splice(i,1);sv('savings',S.savings);render();}
function addSU(){const n=document.getElementById('suN').value.trim(),a=parseFloat(document.getElementById('suA').value)||0,c=document.getElementById('suC').value;if(!n||!a)return alert('Enter name and amount.');S.subs.push({name:n,amount:a,cycle:c});sv('subs',S.subs);render();}
function delSU(i){S.subs.splice(i,1);sv('subs',S.subs);render();}

function addMap(){const r=document.getElementById('mR').value.trim(),l=document.getElementById('mL').value.trim(),c=document.getElementById('mC').value;if(!r||!l)return alert('Fill in both fields.');S.maps[r]={label:l,cat:c};sv('maps',S.maps);render();}
function delMap(k){delete S.maps[k];sv('maps',S.maps);render();}

function expD(){const blob=new Blob([JSON.stringify({maps:S.maps,bills:S.bills,debts:S.debts,periods:S.periods,subs:S.subs,savings:S.savings,planIts:S.planIts||[]},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hub-waf-budget-backup.json';a.click();}
function impD(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.maps)S.maps=d.maps;if(d.bills)S.bills=d.bills;if(d.debts)S.debts=d.debts;if(d.periods)S.periods=d.periods;if(d.subs)S.subs=d.subs;if(d.savings)S.savings=d.savings;if(d.planIts)S.planIts=d.planIts;sv('maps',S.maps);sv('bills',S.bills);sv('debts',S.debts);sv('periods',S.periods);sv('subs',S.subs);sv('savings',S.savings);sv('planIts',S.planIts);render();}catch(e){alert('Invalid JSON.');}};reader.readAsText(file);input.value='';}
function clrAll(){localStorage.clear();location.reload();}

render();
</script>
