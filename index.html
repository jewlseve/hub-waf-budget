<html lang="en">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:15px;color:#1a1a1a;background:#f5f5f0;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.12);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:16px;font-weight:500}
.period-badge{font-size:12px;color:#666;background:#f0efea;padding:4px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.12)}

.tab{padding:8px 14px;border-radius:6px 6px 0 0;font-size:13px;cursor:pointer;border:none;background:none;color:#666;white-space:nowrap;border-bottom:2px solid transparent;font-family:inherit}
.tab.active{color:#1a1a1a;font-weight:500;border-bottom:2px solid #1a1a1a}
.content{padding:20px;flex:1;max-width:900px;margin:0 auto;width:100%}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:16px 20px;margin-bottom:16px}
.card-title{font-size:12px;font-weight:500;color:#666;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.04em}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.metric{background:#f5f5f0;border-radius:8px;padding:12px 14px}
.metric-label{font-size:12px;color:#666;margin-bottom:4px}
.metric-value{font-size:20px;font-weight:500}
.positive{color:#0F6E56}.negative{color:#A32D2D}.warning{color:#854F0B}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.bar-label{width:150px;color:#666;text-align:right;flex-shrink:0;font-size:12px}
.bar-track{flex:1;height:8px;background:#f0efea;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-amount{width:75px;text-align:right;font-variant-numeric:tabular-nums;font-size:13px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.three{grid-template-columns:2fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:#666}
.form-group input,.form-group select{font-size:14px;padding:8px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a;width:100%;font-family:inherit}
.btn{padding:8px 16px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;font-family:inherit}
.btn:hover{background:#f5f5f0}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.primary:hover{opacity:0.85}
.btn.danger{color:#A32D2D;border-color:#F7C1C1}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{text-align:left;padding:8px 10px;font-weight:500;color:#666;border-bottom:0.5px solid rgba(0,0,0,0.1);font-size:12px}
.table td{padding:8px 10px;border-bottom:0.5px solid rgba(0,0,0,0.07);vertical-align:middle}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:#f9f9f7}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-bills{background:#E6F1FB;color:#0C447C}
.badge-debt{background:#FCEBEB;color:#791F1F}
.badge-income{background:#EAF3DE;color:#27500A}
.badge-savings{background:#E1F5EE;color:#085041}

.section-title{font-size:15px;font-weight:500;margin-bottom:12px}
.divider{border:none;border-top:0.5px solid rgba(0,0,0,0.1);margin:16px 0}
.empty{text-align:center;padding:40px 20px;color:#666;font-size:13px}
.progress-bar{height:10px;background:#f0efea;border-radius:6px;overflow:hidden;margin:6px 0}
.progress-fill{height:100%;border-radius:6px;background:#1D9E75}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-info{background:#E6F1FB;color:#0C447C;border:0.5px solid #B5D4F4}

function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function mergeHistorical(){
  const ex=load('periods',{});const merged={};
  Object.keys(HISTORICAL_PERIODS).forEach(k=>{
    if(!ex[k]||!ex[k]._fromHistory){
      const h=HISTORICAL_PERIODS[k];
      merged[k]={_fromHistory:true,label:h.label,rollover:h.rollover,income:h.income.map((i,idx)=>({...i,_idx:idx})),expenses:h.expenses.map((e,idx)=>({...e,_idx:idx})),bills:h.bills.map((b,idx)=>({...b,_idx:idx})),debts:h.debts.map((d,idx)=>({...d,_idx:idx})),savings:h.savings.map((s,idx)=>({...s,_idx:idx})),transactions:[],extraIncome:[],extraExpenses:[]};
    } else {merged[k]=ex[k];}
  });
  Object.keys(ex).forEach(k=>{if(!merged[k])merged[k]=ex[k];});
  return merged;
}

function getPeriodLabel(k){return(state.periods[k]&&state.periods[k].label)||k;}
function getOrCreatePeriod(k){if(!state.periods[k]){state.periods[k]={income:[],expenses:[],bills:[],debts:[],savings:[],transactions:[],extraIncome:[],extraExpenses:[],rollover:0};save('periods',state.periods);}return state.periods[k];}
function fmt(n){return'£'+Math.abs(Number(n)||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});}
function catBadge(c){const cls={Bills:'badge-bills',Debt:'badge-debt',Income:'badge-income',Savings:'badge-savings',Transfer:'badge-transfer'}[c]||'badge-unknown';return`<span class="badge ${cls}">${c||'Other'}</span>`;}

function calcPeriodTotals(k){
  const p=getOrCreatePeriod(k);
  const totalIncome=[...(p.income||[]),...(p.extraIncome||[])].reduce((s,i)=>s+Number(i.amount||0),0);
  const totalBills=(p.bills||[]).reduce((s,b)=>s+Number(b.amount||0),0);
  const totalDebt=(p.debts||[]).reduce((s,d)=>s+Number(d.amount||0),0);
  const totalSavings=(p.savings||[]).reduce((s,sv)=>s+Number(sv.amount||0),0);
  const totalTx=(p.transactions||[]).filter(t=>t.cat!=='Income'&&t.cat!=='Transfer').reduce((s,t)=>s+Number(t.amount||0),0);
  const totalExp=[...(p.expenses||[]),...(p.extraExpenses||[])].reduce((s,e)=>s+Number(e.amount||0),0)+totalTx;
  const remaining=(p.rollover||0)+totalIncome-totalBills-totalDebt-totalSavings-totalExp;
  return{totalIncome,totalBills,totalDebt,totalSavings,totalExp,remaining,rollover:p.rollover||0};
}

let activeTab='dashboard';
function showTab(t){
  activeTab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['dashboard','history','entry','import','bills','debts','savings','settings'][i]===t);
  });
  render();
}

function periodSelect(){
  const periods=Object.keys(state.periods).sort();
  return`<select onchange="changePeriod(this.value)" style="font-size:12px;padding:4px 8px;border-radius:6px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a">${periods.map(pk=>`<option value="${pk}" ${pk===state.currentPeriod?'selected':''}>${getPeriodLabel(pk)}</option>`).join('')}</select>`;
}

function render(){
  document.getElementById('period-label').textContent=getPeriodLabel(state.currentPeriod);
  const el=document.getElementById('content');
  if(activeTab==='dashboard')el.innerHTML=renderDashboard();
  else if(activeTab==='history')el.innerHTML=renderHistory();
  else if(activeTab==='entry')el.innerHTML=renderEntry();
  else if(activeTab==='import')el.innerHTML=renderImport();
  else if(activeTab==='bills')el.innerHTML=renderBills();
  else if(activeTab==='debts')el.innerHTML=renderDebts();
  else if(activeTab==='savings')el.innerHTML=renderSavings();
  else if(activeTab==='settings')el.innerHTML=renderSettings();
}

function renderDashboard(){
  const t=calcPeriodTotals(state.currentPeriod);
  const p=getOrCreatePeriod(state.currentPeriod);
  const allExp=[...(p.expenses||[]),...(p.extraExpenses||[]),...(p.transactions||[]).filter(tx=>tx.cat!=='Income'&&tx.cat!=='Transfer')];
  const catBreakdown={};
  allExp.forEach(e=>{const c=e.cat||'Other';catBreakdown[c]=(catBreakdown[c]||0)+Number(e.amount||0);});
  if(t.totalBills>0)catBreakdown['Bills']=(catBreakdown['Bills']||0)+t.totalBills;
  if(t.totalDebt>0)catBreakdown['Debt']=(catBreakdown['Debt']||0)+t.totalDebt;
  if(t.totalSavings>0)catBreakdown['Savings']=(catBreakdown['Savings']||0)+t.totalSavings;
  const sortedCats=Object.entries(catBreakdown).sort((a,b)=>b[1]-a[1]);
  const maxCat=sortedCats[0]?sortedCats[0][1]:1;
  return`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div class="section-title" style="margin:0">Period overview</div>${periodSelect()}</div>
  <div class="metrics">
    <div class="metric"><div class="metric-label">Rollover</div><div class="metric-value">${fmt(t.rollover)}</div></div>
    <div class="metric"><div class="metric-label">Income</div><div class="metric-value positive">${fmt(t.totalIncome)}</div></div>
    <div class="metric"><div class="metric-label">Bills</div><div class="metric-value">${fmt(t.totalBills)}</div></div>
    <div class="metric"><div class="metric-label">Debt payments</div><div class="metric-value negative">${fmt(t.totalDebt)}</div></div>
    <div class="metric"><div class="metric-label">Other spending</div><div class="metric-value warning">${fmt(t.totalExp)}</div></div>
    <div class="metric"><div class="metric-label">Savings</div><div class="metric-value positive">${fmt(t.totalSavings)}</div></div>
    <div class="metric"><div class="metric-label">Remaining</div><div class="metric-value ${t.remaining>=0?'positive':'negative'}">${fmt(t.remaining)}</div></div>
  </div>
  <div class="card">
    <div class="card-title">Spending breakdown</div>
    ${sortedCats.length?sortedCats.map(([c,v])=>`<div class="bar-row"><div class="bar-label">${c}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxCat*100)}%;background:${BARCOLORS[c]||'#888780'}"></div></div><div class="bar-amount">${fmt(v)}</div></div>`).join(''):'<div class="empty">No spending data yet for this period.</div>'}
  </div>
  <div class="card">
    <div class="card-title">Debt snowball</div>
    ${state.debts.filter(d=>Number(d.balance||0)>0).length?state.debts.filter(d=>Number(d.balance||0)>0).sort((a,b)=>a.balance-b.balance).map((d,i)=>`
      <div class="debt-card">
        <div class="snowball-order">${i+1}</div>
        <div class="debt-info">
          <div class="debt-name">${d.name}</div>
          <div class="debt-meta">${d.notes||''} ${d.rate>0?'· '+d.rate+'% APR':''}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${d.initialBalance>0?Math.min(100,Math.round((d.initialBalance-d.balance)/d.initialBalance*100)):0}%"></div></div>
        </div>
        <div class="debt-balance"><div class="debt-balance-num">${fmt(d.balance)}</div><div class="debt-payment">min ${fmt(d.minPayment||0)}/mo</div></div>
      </div>`).join(''):'<div class="empty">Enter current debt balances in the Debts tab.</div>'}
  </div>`;
}

function renderHistory(){
  const periods=Object.keys(state.periods).sort();
  const incomeData=periods.map(k=>calcPeriodTotals(k).totalIncome);
  const debtData=periods.map(k=>calcPeriodTotals(k).totalDebt);
  const billsData=periods.map(k=>calcPeriodTotals(k).totalBills);
  const maxVal=Math.max(...incomeData,...debtData,...billsData,1);
  const chartH=160;const chartW=periods.length*90;
  const bars=periods.map((k,i)=>{
    const t=calcPeriodTotals(k);
    const x=i*90+5;const lbl=getPeriodLabel(k).split('(')[0].trim().replace(' 2025','').replace(' 2026','');
    const iH=Math.round(t.totalIncome/maxVal*chartH);const dH=Math.round(t.totalDebt/maxVal*chartH);const bH=Math.round(t.totalBills/maxVal*chartH);
    return`<rect x="${x}" y="${chartH-iH}" width="18" height="${iH}" fill="#639922" rx="2"/><rect x="${x+20}" y="${chartH-bH}" width="18" height="${bH}" fill="#378ADD" rx="2"/><rect x="${x+40}" y="${chartH-dH}" width="18" height="${dH}" fill="#E24B4A" rx="2"/><text x="${x+29}" y="${chartH+14}" text-anchor="middle" font-size="10" fill="#666">${lbl}</text>`;
  }).join('');
  const rows=periods.map(k=>{const t=calcPeriodTotals(k);return`<div class="history-row"><div style="font-size:12px;color:#666">${getPeriodLabel(k).split('(')[0].trim()}</div><div class="positive">${fmt(t.totalIncome)}</div><div>${fmt(t.totalBills)}</div><div class="negative">${fmt(t.totalDebt)}</div><div class="warning">${fmt(t.totalExp)}</div><div class="${t.remaining>=0?'positive':'negative'}">${fmt(t.remaining)}</div></div>`;}).join('');
  return`
  <div class="card">
    <div class="card-title">Monthly overview — all periods</div>
    <svg viewBox="0 0 ${Math.max(chartW,400)} ${chartH+30}" style="width:100%;overflow:visible">${bars}</svg>
    <div style="display:flex;gap:16px;margin-top:8px;font-size:12px;color:#666">
      <span><span style="display:inline-block;width:10px;height:10px;background:#639922;border-radius:2px;margin-right:4px"></span>Income</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#378ADD;border-radius:2px;margin-right:4px"></span>Bills</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#E24B4A;border-radius:2px;margin-right:4px"></span>Debt payments</span>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Period-by-period summary</div>
    <div class="history-row history-header"><div>Period</div><div>Income</div><div>Bills</div><div>Debt paid</div><div>Other exp</div><div>Remaining</div></div>
    ${rows}
  </div>`;
}

function addIncome(){const label=document.getElementById('inc-label').value.trim();const amount=parseFloat(document.getElementById('inc-amount').value);const who=document.getElementById('inc-who').value;if(!label||isNaN(amount)||amount<=0)return alert('Enter a description and amount.');const p=getOrCreatePeriod(state.currentPeriod);if(!p.extraIncome)p.extraIncome=[];p.extraIncome.push({label,amount,who});save('periods',state.periods);render();}
function delExtraIncome(i){const p=getOrCreatePeriod(state.currentPeriod);p.extraIncome.splice(i,1);save('periods',state.periods);render();}
function addExpense(){const label=document.getElementById('exp-label').value.trim();const amount=parseFloat(document.getElementById('exp-amount').value);const cat=document.getElementById('exp-cat').value;if(!label||isNaN(amount)||amount<=0)return alert('Enter a description and amount.');const p=getOrCreatePeriod(state.currentPeriod);if(!p.extraExpenses)p.extraExpenses=[];p.extraExpenses.push({label,amount,cat});save('periods',state.periods);render();}
function delExtraExpense(i){const p=getOrCreatePeriod(state.currentPeriod);p.extraExpenses.splice(i,1);save('periods',state.periods);render();}
const AMEX_CAT_MAP={'Entertainment-Restaurants':'Dining','Entertainment-Bars & Cafés':'Dining','Entertainment-Sports Events':'Entertainment','General Purchases-Groceries':'Groceries','General Purchases-Pharmacies':'Health','General Purchases-Clothing Stores':'Clothing','General Purchases-Computer Supplies':'Shopping','General Purchases-Wholesale Stores':'Groceries','General Purchases-Online Purchases':'Shopping'};

function handleCSV(input){
  const file=input.files[0];if(!file)return;
  const bank=document.getElementById('csv-bank').value;
  const reader=new FileReader();
  reader.onload=e=>{
    const txs=parseCSV(e.target.result,bank);
    const p=getOrCreatePeriod(state.currentPeriod);
    if(!p.transactions)p.transactions=[];
    let idx=p.transactions.length;
    txs.forEach(t=>{
      const m=applyMapping(t.rawLabel);
      if(m){t.label=m.label;t.cat=m.cat;}
      else{t.label=t.rawLabel;t.cat=t.amexCat||'Unknown';}
      t._idx=idx++;
      p.transactions.push(t);
    });
    save('periods',state.periods);render();
  };
  reader.readAsText(file);input.value='';
}

function parseCSV(text,bank){
  const lines=text.split('\n').filter(l=>l.trim());
  const txs=[];
  if(bank==='barclays'){
    // Barclays format: Number, Date, Account, Amount, Subcategory, Memo
    for(let i=1;i<lines.length;i++){
      const cols=parseLine(lines[i]);
      if(cols.length<4)continue;
      const date=cols[1]?.trim();
      const amtRaw=parseFloat((cols[3]||'').replace(/[^0-9.-]/g,''));
      const subcategory=(cols[4]||'').trim();
      const rawLabel=(cols[5]||'').split('\t')[0].trim();
      if(!rawLabel||isNaN(amtRaw)||amtRaw===0)continue;
      // Skip incoming Funds Transfers (salary transfers between own accounts)
      if(subcategory==='Funds Transfer'&&amtRaw>0)continue;
      // Skip Counter Credits (bank shift income - entered manually)
      if(subcategory==='Counter Credit')continue;
      const amount=Math.abs(amtRaw);
      txs.push({date,rawLabel,amount,label:rawLabel,cat:'Unknown',subcategory,_idx:0});
    }
  } else {
    // Amex format: Date, Description, Card Member, Account #, Amount, Extended Details, Appears On Your Statement As, ..., Category
    for(let i=1;i<lines.length;i++){
      const cols=parseLine(lines[i]);
      const date=cols[0]?.trim();
      const rawLabel=(cols[1]||'').trim();
      const cardMember=(cols[2]||'').trim();
      const amtRaw=parseFloat((cols[4]||'').replace(/[^0-9.-]/g,''));
      const amexCatRaw=(cols[12]||'').trim();
      const amexCat=AMEX_CAT_MAP[amexCatRaw]||'';
      // Skip payments received (negative amounts) and blank labels
      if(!rawLabel||isNaN(amtRaw)||amtRaw<=0)continue;
      // Skip "PAYMENT RECEIVED" entries
      if(rawLabel.toUpperCase().includes('PAYMENT RECEIVED'))continue;
      // Label includes card member name to distinguish Hub vs Waf spending
      const memberTag=cardMember.split(' ')[0];
      const labelWithMember=rawLabel+' ('+memberTag+')';
      txs.push({date,rawLabel:rawLabel,amount:amtRaw,label:labelWithMember,amexCat,cat:'Unknown',cardMember,_idx:0});
    }
  }
  return txs;
}
function parseLine(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){if(l[i]==='"')q=!q;else if(l[i]===','&&!q){r.push(c);c='';}else c+=l[i];}r.push(c);return r;}
function applyMapping(raw){const lo=raw.toLowerCase();for(const[k,v]of Object.entries(state.mappings))if(lo.includes(k.toLowerCase()))return v;return null;}
function setTxLabel(idx,field,val){const p=getOrCreatePeriod(state.currentPeriod);const t=p.transactions.find(t=>t._idx===idx);if(t)t[field]=val;save('periods',state.periods);}
function learnMapping(idx){const p=getOrCreatePeriod(state.currentPeriod);const t=p.transactions.find(t=>t._idx===idx);if(!t||!t.cat||t.cat==='Unknown')return alert('Pick a category first.');state.mappings[t.rawLabel.substring(0,20)]={label:t.label,cat:t.cat};save('mappings',state.mappings);render();}
function delTx(idx){const p=getOrCreatePeriod(state.currentPeriod);p.transactions=p.transactions.filter(t=>t._idx!==idx);save('periods',state.periods);render();}
function addBill(){const name=document.getElementById('bill-name').value.trim();const amount=parseFloat(document.getElementById('bill-amount').value);const day=parseInt(document.getElementById('bill-day').value)||0;if(!name||isNaN(amount))return alert('Enter name and amount.');state.bills.push({name,amount,day,cat:'Bills'});save('bills',state.bills);render();}
function delBill(i){state.bills.splice(i,1);save('bills',state.bills);render();}
function addDebt(){const name=document.getElementById('debt-name').value.trim();const balance=parseFloat(document.getElementById('debt-balance').value)||0;const rate=parseFloat(document.getElementById('debt-rate').value)||0;const minPayment=parseFloat(document.getElementById('debt-min').value)||0;const notes=document.getElementById('debt-notes').value.trim();if(!name)return alert('Enter a debt name.');const i=state.debts.findIndex(d=>d.name===name);if(i>=0){if(!state.debts[i].initialBalance&&balance>0)state.debts[i].initialBalance=balance;Object.assign(state.debts[i],{balance,rate,minPayment,notes});}else state.debts.push({name,balance,rate,minPayment,notes,initialBalance:balance});save('debts',state.debts);render();}
function delDebt(name){state.debts=state.debts.filter(d=>d.name!==name);save('debts',state.debts);render();}
function addSaving(){const name=document.getElementById('sv-name').value.trim();const goal=parseFloat(document.getElementById('sv-goal').value)||0;const saved=parseFloat(document.getElementById('sv-saved').value)||0;const platform=document.getElementById('sv-platform').value.trim();if(!name)return alert('Enter a goal name.');state.savings.push({name,goal,saved,platform});save('savings',state.savings);render();}
function delSaving(i){state.savings.splice(i,1);save('savings',state.savings);render();}
function addSub(){const name=document.getElementById('sub-name').value.trim();const amount=parseFloat(document.getElementById('sub-amount').value)||0;const cycle=document.getElementById('sub-cycle').value;if(!name||!amount)return alert('Enter name and amount.');state.subs.push({name,amount,cycle});save('subs',state.subs);render();}
function delSub(i){state.subs.splice(i,1);save('subs',state.subs);render();}
function addMapping(){const raw=document.getElementById('map-raw').value.trim();const label=document.getElementById('map-label').value.trim();const cat=document.getElementById('map-cat').value;if(!raw||!label)return alert('Fill in both fields.');state.mappings[raw]={label,cat};save('mappings',state.mappings);render();}
function delMapping(key){delete state.mappings[key];save('mappings',state.mappings);render();}
function exportData(){const blob=new Blob([JSON.stringify({mappings:state.mappings,bills:state.bills,debts:state.debts,periods:state.periods,subs:state.subs,savings:state.savings},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hub-waf-budget-backup.json';a.click();}
function importData(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.mappings)state.mappings=d.mappings;if(d.bills)state.bills=d.bills;if(d.debts)state.debts=d.debts;if(d.periods)state.periods=d.periods;if(d.subs)state.subs=d.subs;if(d.savings)state.savings=d.savings;save('mappings',state.mappings);save('bills',state.bills);save('debts',state.debts);save('periods',state.periods);save('subs',state.subs);save('savings',state.savings);render();}catch(e){alert('Invalid JSON file.');}};reader.readAsText(file);input.value='';}
function clearAll(){localStorage.clear();location.reload();}

render();
</script>
