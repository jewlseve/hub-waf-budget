<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub & Waf Budget</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:15px;color:#1a1a1a;background:#f5f5f0;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.12);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:16px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:8px}
.period-badge{font-size:12px;color:#666;background:#f0efea;padding:4px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.12)}
.iconbtn{background:none;border:0.5px solid rgba(0,0,0,0.18);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:14px;color:#666;display:flex;align-items:center;justify-content:center}
.iconbtn:hover:not(:disabled){background:#f5f5f0}
.iconbtn:disabled{opacity:0.35;cursor:not-allowed}
.tabs{display:flex;gap:2px;padding:10px 20px 0;background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.12);overflow-x:auto}
.tab{padding:8px 12px;border-radius:6px 6px 0 0;font-size:13px;cursor:pointer;border:none;background:none;color:#666;white-space:nowrap;border-bottom:2px solid transparent;font-family:inherit}
.tab.active{color:#1a1a1a;font-weight:500;border-bottom:2px solid #1a1a1a}
.content{padding:20px;flex:1;max-width:960px;margin:0 auto;width:100%}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:16px 20px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:600;color:#888;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.06em;display:flex;align-items:center;justify-content:space-between}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.metric{background:#f5f5f0;border-radius:8px;padding:12px 14px}
.metric-label{font-size:11px;color:#888;margin-bottom:4px}
.metric-value{font-size:19px;font-weight:500}
.green{color:#0F6E56}.red{color:#A32D2D}.amber{color:#854F0B}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{width:140px;color:#888;text-align:right;flex-shrink:0;font-size:12px}
.bar-track{flex:1;height:8px;background:#f0efea;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-amt{width:80px;text-align:right;font-size:13px;font-variant-numeric:tabular-nums}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.three{grid-template-columns:2fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;color:#666}
.fg input,.fg select{font-size:14px;padding:8px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a;width:100%;font-family:inherit}
.btn{padding:8px 16px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;font-family:inherit}
.btn:hover:not(:disabled){background:#f5f5f0}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.primary:hover{opacity:0.85}
.btn.danger{color:#A32D2D;border-color:#F7C1C1;font-size:12px;padding:4px 10px}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;font-weight:500;color:#888;border-bottom:0.5px solid rgba(0,0,0,0.1);font-size:11px;text-transform:uppercase}
.tbl td{padding:8px 10px;border-bottom:0.5px solid rgba(0,0,0,0.06);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafaf8}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.b-bills{background:#E6F1FB;color:#0C447C}
.b-debt{background:#FCEBEB;color:#791F1F}
.b-income{background:#EAF3DE;color:#27500A}
.b-savings{background:#E1F5EE;color:#085041}
.b-transfer{background:#EEEDFE;color:#3C3489}
.b-other{background:#f0efea;color:#666}
.hr{border:none;border-top:0.5px solid rgba(0,0,0,0.08);margin:14px 0}
.empty{text-align:center;padding:32px 20px;color:#999;font-size:13px}
.pbar{height:8px;background:#f0efea;border-radius:6px;overflow:hidden;margin:6px 0}
.pbar-fill{height:100%;border-radius:6px;background:#1D9E75}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-info{background:#E6F1FB;color:#0C447C;border:0.5px solid #B5D4F4}
.alert-warn{background:#FAEEDA;color:#633806;border:0.5px solid #FAC775}
.dcard{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:0.5px solid rgba(0,0,0,0.06)}
.dcard:last-child{border-bottom:none}
.dcard-info{flex:1;min-width:0}
.dcard-name{font-weight:500;font-size:14px}
.dcard-meta{font-size:12px;color:#888;margin-top:2px}
.dcard-right{text-align:right;min-width:100px;flex-shrink:0}
.dcard-bal{font-size:16px;font-weight:500;color:#A32D2D}
.dcard-sub{font-size:12px;color:#888;margin-top:2px}
.upload-zone{border:1px dashed rgba(0,0,0,0.2);border-radius:12px;padding:28px;text-align:center;cursor:pointer;color:#888;font-size:13px;margin-bottom:12px}
.upload-zone:hover{background:#f5f5f0}
.snowball-n{font-size:11px;color:#666;background:#f0efea;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600}
.hist-row{display:grid;grid-template-columns:130px 1fr 1fr 1fr 1fr 1fr;gap:8px;padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,0.06);font-size:13px;align-items:center}
.hist-row:last-child{border-bottom:none}
.hist-hdr{font-weight:600;font-size:11px;color:#888;text-transform:uppercase}
.tip{display:inline-block;width:14px;height:14px;border-radius:50%;background:#ddd;color:#666;font-size:10px;font-weight:600;text-align:center;line-height:14px;margin-left:4px;cursor:help;vertical-align:middle}
.fix-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:8px;margin-bottom:8px}
.fix-btn{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.18);background:#fff;cursor:pointer;font-family:inherit;font-size:13px;text-align:left;color:#1a1a1a}
.fix-btn:hover{background:#f5f5f0}
.fix-btn.danger{color:#A32D2D;border-color:#F7C1C1}
.fix-btn.danger:hover{background:#fff5f5}
.search-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.search-bar input{flex:1;font-size:14px;padding:8px 12px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;font-family:inherit}
.tx-row{display:grid;grid-template-columns:90px 1fr 80px 110px 90px 60px;gap:8px;padding:8px 6px;border-bottom:0.5px solid rgba(0,0,0,0.05);font-size:13px;align-items:center}
.tx-row:hover{background:#fafaf8}
.tx-edit-input{font-size:12px;padding:4px 6px;border-radius:4px;border:0.5px solid rgba(0,0,0,0.18);background:#fff;width:100%;font-family:inherit}
.tx-period{font-size:11px;color:#666;background:#f0efea;padding:2px 6px;border-radius:4px;display:inline-block}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:12px}
.cat-pill{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:20px;background:#f5f5f0;font-size:12px;border:0.5px solid rgba(0,0,0,0.08)}
.cat-pill .x{cursor:pointer;color:#999;margin-left:6px}
.cat-pill .x:hover{color:#A32D2D}
.cat-pill.locked{opacity:0.6}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1>Hub &amp; Waf Budget</h1>
  <div class="topbar-right">
    <button class="iconbtn" id="undoBtn" onclick="doUndo()" title="Undo last action">↶</button>
    <button class="iconbtn" id="redoBtn" onclick="doRedo()" title="Redo">↷</button>
    <span class="period-badge" id="period-label">Loading...</span>
  </div>
</div>
<div class="tabs" id="nav">
  <button class="tab active" onclick="go('dashboard')">Dashboard</button>
  <button class="tab" onclick="go('history')">History</button>
  <button class="tab" onclick="go('entry')">Add Data</button>
  <button class="tab" onclick="go('import')">Import CSV</button>
  <button class="tab" onclick="go('search')">Search</button>
  <button class="tab" onclick="go('bills')">Bills</button>
  <button class="tab" onclick="go('debts')">Debts</button>
  <button class="tab" onclick="go('planits')">Plan It / BNPL</button>
  <button class="tab" onclick="go('savings')">Savings &amp; Subs</button>
  <button class="tab" onclick="go('settings')">Settings</button>
</div>
<div class="content" id="app"></div>
</div>
<script>
// ───────── DEFAULTS ─────────
const DEFAULT_CATS=['Income','Bills','Debt','Groceries','Dining','Travel','Clothing','Shopping','Home','Entertainment','Health','Personal Care','Work Expenses','Remittance','Savings','Transfer','Other'];
const LOCKED_CATS=['Income','Bills','Debt','Savings','Transfer','Other']; // can't be deleted
const BARCOL={Bills:'#378ADD',Debt:'#E24B4A',Groceries:'#4C9A2A',Dining:'#BA7517',Travel:'#534AB7',Clothing:'#D4537E',Shopping:'#E8873A',Entertainment:'#1D9E75',Other:'#888780',Remittance:'#D85A30','Work Expenses':'#5DCAA5',Home:'#7F77DD','Personal Care':'#EF9F27',Health:'#22A870',Savings:'#1D9E75',Income:'#4C9A2A'};
const ACC_MAP={'20-26-86 90632368':'Hub','20-17-22 43623793':'Joint'};
const NHS_REF_MAP={'30464712-2':{label:'Paycheck Hub Bank',who:'Hub'},'30464712':{label:'Paycheck Hub',who:'Hub'},'30454770-2':{label:'Paycheck Waf Bank',who:'Waf'},'30454770':{label:'Paycheck Waf',who:'Waf'}};
const AMEX_CAT={'Entertainment-Restaurants':'Dining','Entertainment-Bars & Cafes':'Dining','Entertainment-Sports Events':'Entertainment','General Purchases-Groceries':'Groceries','General Purchases-Pharmacies':'Health','General Purchases-Clothing Stores':'Clothing','General Purchases-Computer Supplies':'Shopping','General Purchases-Wholesale Stores':'Groceries','General Purchases-Online Purchases':'Shopping'};
const DEFAULT_MAPS={'Cooke Curtis':{label:'Rent',cat:'Bills'},'Novuna Personal':{label:'Furniture Village',cat:'Bills'},'EE Limited':{label:'EE (SIM)',cat:'Bills'},'EE Ltd':{label:'EE Broadband',cat:'Bills'},'Scdc':{label:'Council Tax',cat:'Bills'},'Barclayloan':{label:'BarcLoan Waf',cat:'Debt'},'Bloan':{label:'BarcLoan Hub',cat:'Debt'},'B/Card Forward':{label:'Barclaycard Waf',cat:'Debt'},'Mr Rene Inapan':{label:'Barclaycard Hub',cat:'Debt'},'One Utility Bill':{label:'Electricity',cat:'Bills'},'AMERICAN EXP':{label:'Amex Payment',cat:'Transfer'},'PAYMENT RECEIVED':{label:'Amex Payment Received',cat:'Transfer'},'INSTALMENT PLAN FEE':{label:'Plan It Fee',cat:'Debt'},'AMOUNT TRANSFERRED FROM CREDIT':{label:'Plan It Transfer',cat:'Transfer'},'Trading 212':{label:'Trading 212',cat:'Savings'},'Amazon Prime':{label:'Amazon Prime',cat:'Bills'},'Disney':{label:'Disney+',cat:'Bills'},'Adobe':{label:'Adobe',cat:'Bills'},'Vitality':{label:'Vitality Insurance',cat:'Bills'},'Microsoft':{label:'Microsoft 365',cat:'Bills'},'Tesco':{label:'Tesco',cat:'Groceries'},'Sainsbury':{label:"Sainsbury's",cat:'Groceries'},'Lidl':{label:'Lidl',cat:'Groceries'},'Aldi':{label:'Aldi',cat:'Groceries'},'Co-op':{label:'Co-op',cat:'Groceries'},'Marks Spencer':{label:'M&S',cat:'Groceries'},'Deliveroo':{label:'Deliveroo',cat:'Dining'},'Just Eat':{label:'Just Eat',cat:'Dining'},'Uber Eats':{label:'Uber Eats',cat:'Dining'},'Compass Group':{label:'Compass (Canteen)',cat:'Dining'},'Trainline':{label:'Trainline',cat:'Travel'},'National Rail':{label:'National Rail',cat:'Travel'},'Stagecoach':{label:'Stagecoach',cat:'Travel'},'Spotify':{label:'Spotify',cat:'Entertainment'},'Netflix':{label:'Netflix',cat:'Entertainment'},'Tenpin':{label:'Tenpin Bowling',cat:'Entertainment'},'Wildlife Trust':{label:'Wildlife Trust',cat:'Bills'}};
const DEFAULT_BILLS=[{name:'Rent',amount:1425,day:21},{name:'Council Tax',amount:192,day:8},{name:'Electricity',amount:250.73,day:7},{name:'EE (SIM)',amount:67.78,day:28},{name:'EE Broadband',amount:44.99,day:21},{name:'Furniture Village',amount:78.30,day:0},{name:'Vitality Insurance',amount:55.14,day:0},{name:'Amazon Prime',amount:8.99,day:27},{name:'Microsoft 365',amount:14.99,day:22},{name:'Disney+',amount:2.50,day:0},{name:'Adobe',amount:9.98,day:0},{name:'Wildlife Trust',amount:2.50,day:6},{name:"SOS Children's Village",amount:16.12,day:0},{name:'HP Instant Ink',amount:1.50,day:0},{name:'Water',amount:181,day:0},{name:'Apple Watch (Hub)',amount:7.50,day:0}];
const DEFAULT_DEBTS=[{name:'Amex',balance:0,initialBalance:0,rate:22.9,minPayment:1500,notes:'Travel & groceries card'},{name:'Barclaycard Hub',balance:0,initialBalance:0,rate:0,minPayment:250,notes:'Personal spending'},{name:'Barclaycard Waf',balance:0,initialBalance:0,rate:0,minPayment:400,notes:'Personal spending'},{name:'BarcLoan Hub',balance:0,initialBalance:0,rate:0,minPayment:650.18,notes:'Barclays fraud loan'},{name:'BarcLoan Waf',balance:0,initialBalance:0,rate:0,minPayment:650,notes:'Barclays fraud loan'},{name:'CPAWCO Loan',balance:0,initialBalance:0,rate:0,minPayment:272,notes:'Philippine loan'}];

// ───────── STORAGE ─────────
function ld(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ───────── PERIOD HELPERS ─────────
function curKey(){const n=new Date(),d=n.getDate(),m=n.getMonth()+1,y=n.getFullYear();if(d>=25)return y+'-'+String(m).padStart(2,'0');const pm=m===1?12:m-1,py=m===1?y-1:y;return py+'-'+String(pm).padStart(2,'0');}
function pLabel(k){if(S.periods[k]&&S.periods[k].label)return S.periods[k].label;if(!k||!k.includes('-'))return k||'';const[y,m]=k.split('-').map(Number);const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return MO[m-1]+' '+y;}
function pShort(k){if(!k||!k.includes('-'))return k||'';const[y,m]=k.split('-').map(Number);const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return MO[m-1]+' '+y;}
function getP(k){if(!S.periods[k])S.periods[k]={label:pLabel(k),income:[],expenses:[],bills:[],debts:[],savings:[],transactions:[],extraIncome:[],extraExpenses:[],rollover:0};return S.periods[k];}

// ───────── STATE ─────────
const S={maps:ld('maps',DEFAULT_MAPS),bills:ld('bills',DEFAULT_BILLS),debts:ld('debts',DEFAULT_DEBTS),periods:ld('periods',{}),subs:ld('subs',[]),savings:ld('savings',[]),planIts:ld('planIts',[]),customCats:ld('customCats',[]),cur:ld('cur',curKey())};

function getCats(){return [...DEFAULT_CATS,...S.customCats.filter(c=>!DEFAULT_CATS.includes(c))];}

// ───────── HELPERS ─────────
const fmt=n=>'£'+Math.abs(Number(n)||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});
function cb(c){const cls={Bills:'b-bills',Debt:'b-debt',Income:'b-income',Savings:'b-savings',Transfer:'b-transfer'}[c]||'b-other';return '<span class="badge '+cls+'">'+( c||'Other')+'</span>';}
function ord(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function applyMap(raw){const lo=raw.toLowerCase();for(const[k,v]of Object.entries(S.maps))if(lo.includes(k.toLowerCase()))return v;return null;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,"&#39;");}

function calcT(k){const p=getP(k);const txInc=(p.transactions||[]).filter(t=>t.cat==='Income').reduce((s,t)=>s+Number(t.amount||0),0);const manInc=[...(p.income||[]),...(p.extraIncome||[])].reduce((s,i)=>s+Number(i.amount||0),0);const totalIncome=txInc+manInc;const totalBills=(p.bills||[]).reduce((s,b)=>s+Number(b.amount||0),0);const totalDebt=(p.debts||[]).reduce((s,d)=>s+Number(d.amount||0),0);const totalSavings=(p.savings||[]).reduce((s,sv)=>s+Number(sv.amount||0),0);const txExp=(p.transactions||[]).filter(t=>t.cat!=='Income'&&t.cat!=='Transfer').reduce((s,t)=>s+Number(t.amount||0),0);const manExp=[...(p.expenses||[]),...(p.extraExpenses||[])].reduce((s,e)=>s+Number(e.amount||0),0);const totalExp=txExp+manExp;const remaining=(p.rollover||0)+totalIncome-totalBills-totalDebt-totalSavings-totalExp;return{totalIncome,totalBills,totalDebt,totalSavings,totalExp,remaining,rollover:p.rollover||0};}
function pSel(){const keys=Object.keys(S.periods).sort().reverse();if(!keys.includes(S.cur))keys.unshift(S.cur);return '<select onchange="chgP(this.value)" style="font-size:12px;padding:4px 8px;border-radius:6px;border:0.5px solid rgba(0,0,0,0.18);background:#fff">'+keys.map(k=>'<option value="'+k+'"'+(k===S.cur?' selected':'')+'>'+pLabel(k)+'</option>').join('')+'</select>';}

// ───────── UNDO/REDO ─────────
function snapshot(){const snap={maps:S.maps,bills:S.bills,debts:S.debts,periods:S.periods,subs:S.subs,savings:S.savings,planIts:S.planIts,customCats:S.customCats};const u=ld('undoStack',[]);u.push(JSON.stringify(snap));if(u.length>20)u.shift();sv('undoStack',u);sv('redoStack',[]);}
function applySnap(s){S.maps=s.maps||{};S.bills=s.bills||[];S.debts=s.debts||[];S.periods=s.periods||{};S.subs=s.subs||[];S.savings=s.savings||[];S.planIts=s.planIts||[];S.customCats=s.customCats||[];sv('maps',S.maps);sv('bills',S.bills);sv('debts',S.debts);sv('periods',S.periods);sv('subs',S.subs);sv('savings',S.savings);sv('planIts',S.planIts);sv('customCats',S.customCats);}
function doUndo(){const u=ld('undoStack',[]);if(!u.length)return alert('Nothing to undo.');const cur={maps:S.maps,bills:S.bills,debts:S.debts,periods:S.periods,subs:S.subs,savings:S.savings,planIts:S.planIts,customCats:S.customCats};const r=ld('redoStack',[]);r.push(JSON.stringify(cur));sv('redoStack',r);applySnap(JSON.parse(u.pop()));sv('undoStack',u);render();}
function doRedo(){const r=ld('redoStack',[]);if(!r.length)return alert('Nothing to redo.');const cur={maps:S.maps,bills:S.bills,debts:S.debts,periods:S.periods,subs:S.subs,savings:S.savings,planIts:S.planIts,customCats:S.customCats};const u=ld('undoStack',[]);u.push(JSON.stringify(cur));sv('undoStack',u);applySnap(JSON.parse(r.pop()));sv('redoStack',r);render();}

// ───────── FIX ACTIONS ─────────
function fixDuplicates(){if(!confirm('Remove exact duplicate transactions (same date, label, and amount) within each period?'))return;snapshot();let removed=0;Object.keys(S.periods).forEach(k=>{const seen=new Set();const before=(S.periods[k].transactions||[]).length;S.periods[k].transactions=(S.periods[k].transactions||[]).filter(t=>{const key=t.date+'|'+t.rawLabel+'|'+t.amount;if(seen.has(key))return false;seen.add(key);return true;});removed+=before-(S.periods[k].transactions||[]).length;});sv('periods',S.periods);alert('Removed '+removed+' duplicate(s).');render();}
function fixClearImports(){if(!confirm('Clear all imported transactions across every period? Bills, debts, savings, mappings, and manual entries are kept.'))return;snapshot();Object.keys(S.periods).forEach(k=>{S.periods[k].transactions=[];});sv('periods',S.periods);render();}
function fixClearEmptyPeriods(){if(!confirm('Remove periods with no data?'))return;snapshot();let removed=0;Object.keys(S.periods).forEach(k=>{const p=S.periods[k];const empty=(!p.transactions||!p.transactions.length)&&(!p.income||!p.income.length)&&(!p.extraIncome||!p.extraIncome.length)&&(!p.expenses||!p.expenses.length)&&(!p.extraExpenses||!p.extraExpenses.length)&&!Number(p.rollover||0);if(empty&&k!==S.cur){delete S.periods[k];removed++;}});sv('periods',S.periods);alert('Removed '+removed+' empty period(s).');render();}
function fixReapplyMappings(){if(!confirm('Re-apply your saved name and category mappings to ALL existing transactions? This will update labels and categories where mappings match.'))return;snapshot();let updated=0;Object.keys(S.periods).forEach(k=>{(S.periods[k].transactions||[]).forEach(t=>{const m=applyMap(t.rawLabel);if(m){if(t.label!==m.label||t.cat!==m.cat){t.label=m.label;t.cat=m.cat;updated++;}}});});sv('periods',S.periods);alert('Updated '+updated+' transaction(s) using saved mappings.');render();}
function fixRedetectPeriods(){if(!confirm('Re-detect period boundaries from salary arrival dates?'))return;snapshot();const allTx=[];Object.entries(S.periods).forEach(([k,p])=>{(p.transactions||[]).forEach(t=>allTx.push(t));});Object.keys(S.periods).forEach(k=>{S.periods[k].transactions=[];});const boundaries=detectSalaryPeriods(allTx);if(!boundaries.length){alert('No salary transactions found.');return;}allTx.forEach(t=>{const newKey=dynamicPeriodKey(t.date,boundaries);const p=getP(newKey);if(!p.transactions)p.transactions=[];t._idx=p.transactions.length;p.transactions.push(t);applyPeriodLabel(p,boundaries,newKey);});sv('periods',S.periods);alert('Periods re-detected.');render();}

// ───────── DYNAMIC PERIOD DETECTION ─────────
function detectSalaryPeriods(txs){
  const salaries=[];
  const list=txs||[];
  if(!txs){Object.values(S.periods).forEach(p=>{(p.transactions||[]).forEach(t=>list.push(t));});}
  list.forEach(t=>{
    if(t.cat==='Income'&&(t.label==='Paycheck Hub'||t.label==='Paycheck Waf')){
      const dp=(t.date||'').split('/');
      if(dp.length===3){const dt=new Date(+dp[2],+dp[1]-1,+dp[0]);if(!isNaN(dt))salaries.push({date:t.date,obj:dt,label:t.label,month:+dp[2]*100+ +dp[1]});}
    }
  });
  const byMonth={};
  salaries.forEach(s=>{if(!byMonth[s.month]||s.obj<byMonth[s.month].obj)byMonth[s.month]=s;});
  const overrides=ld('overrides',{});
  Object.entries(overrides).forEach(([m,d])=>{const dp=d.split('/');if(dp.length===3){const dt=new Date(+dp[2],+dp[1]-1,+dp[0]);byMonth[+m]={date:d,obj:dt,label:'Override',month:+m};}});
  return Object.values(byMonth).sort((a,b)=>a.obj-b.obj);
}
function dynamicPeriodKey(dateStr,boundaries){
  if(!dateStr||!boundaries||!boundaries.length)return dateToCalendarPeriod(dateStr);
  const dp=dateStr.split('/');if(dp.length!==3)return curKey();
  const txDate=new Date(+dp[2],+dp[1]-1,+dp[0]);
  let chosen=null;
  for(const b of boundaries){if(b.obj<=txDate)chosen=b;else break;}
  if(!chosen){const f=boundaries[0],py=f.obj.getFullYear(),pm=f.obj.getMonth()+1;const prevM=pm===1?12:pm-1,prevY=pm===1?py-1:py;return prevY+'-'+String(prevM).padStart(2,'0');}
  return chosen.obj.getFullYear()+'-'+String(chosen.obj.getMonth()+1).padStart(2,'0');
}
function dateToCalendarPeriod(ds){if(!ds)return S.cur;const p=ds.split('/');if(p.length!==3)return S.cur;const d=+p[0],m=+p[1],y=+p[2];if(isNaN(d)||isNaN(m)||isNaN(y))return S.cur;if(d>=25)return y+'-'+String(m).padStart(2,'0');const pm=m===1?12:m-1,py=m===1?y-1:y;return py+'-'+String(pm).padStart(2,'0');}
function addDaysStr(ds,days){const dp=ds.split('/');if(dp.length!==3)return ds;const d=new Date(+dp[2],+dp[1]-1,+dp[0]);d.setDate(d.getDate()+days);return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function applyPeriodLabel(p,boundaries,key){const idx=boundaries.findIndex(b=>(b.obj.getFullYear()+'-'+String(b.obj.getMonth()+1).padStart(2,'0'))===key);if(idx>=0){const start=boundaries[idx],next=boundaries[idx+1],startStr=start.date,endStr=next?addDaysStr(next.date,-1):'present';const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];p.label=MO[start.obj.getMonth()]+' '+start.obj.getFullYear()+' ('+startStr+' – '+endStr+')';}}

function setOverride(monthKey,dateStr){const ov=ld('overrides',{});if(dateStr)ov[monthKey]=dateStr;else delete ov[monthKey];sv('overrides',ov);fixRedetectPeriods();}
function saveOverride(mk){const v=document.getElementById('ov_'+mk).value.trim();if(!v){alert('Enter a date in DD/MM/YYYY.');return;}if(!/^\d{2}\/\d{2}\/\d{4}$/.test(v)){alert('Format must be DD/MM/YYYY');return;}setOverride(mk,v);}

// ───────── HISTORY (with category-per-cycle chart) ─────────
function rHist(){
  const keys=Object.keys(S.periods).sort();
  if(!keys.length)return '<div class="card"><div class="empty">No data yet. Import CSVs to see history.</div></div>';
  const iD=keys.map(k=>calcT(k).totalIncome),dD=keys.map(k=>calcT(k).totalDebt),bD=keys.map(k=>calcT(k).totalBills);
  const mx=Math.max(...iD,...dD,...bD,1);const H=140,W=keys.length*80;
  const bars=keys.map((k,i)=>{const t=calcT(k),x=i*80+6;const iH=Math.round(t.totalIncome/mx*H),dH=Math.round(t.totalDebt/mx*H),bH=Math.round(t.totalBills/mx*H);return'<rect x="'+x+'" y="'+(H-iH)+'" width="16" height="'+iH+'" fill="#4C9A2A" rx="2"/><rect x="'+(x+18)+'" y="'+(H-bH)+'" width="16" height="'+bH+'" fill="#378ADD" rx="2"/><rect x="'+(x+36)+'" y="'+(H-dH)+'" width="16" height="'+dH+'" fill="#E24B4A" rx="2"/><text x="'+(x+25)+'" y="'+(H+14)+'" text-anchor="middle" font-size="10" fill="#888">'+pShort(k)+'</text>';}).join('');

  // Category-per-period stacked bars
  const allCats=new Set();
  const catByPeriod={};
  keys.forEach(k=>{
    catByPeriod[k]={};
    const p=getP(k);
    [...(p.transactions||[]).filter(x=>x.cat!=='Income'&&x.cat!=='Transfer'),...(p.expenses||[]),...(p.extraExpenses||[])].forEach(x=>{const c=x.cat||'Other';catByPeriod[k][c]=(catByPeriod[k][c]||0)+Number(x.amount||0);allCats.add(c);});
    const t=calcT(k);if(t.totalBills>0){catByPeriod[k]['Bills']=(catByPeriod[k]['Bills']||0)+t.totalBills;allCats.add('Bills');}
    if(t.totalDebt>0){catByPeriod[k]['Debt']=(catByPeriod[k]['Debt']||0)+t.totalDebt;allCats.add('Debt');}
    if(t.totalSavings>0){catByPeriod[k]['Savings']=(catByPeriod[k]['Savings']||0)+t.totalSavings;allCats.add('Savings');}
  });
  const sortedCats=[...allCats].sort((a,b)=>{const sumA=keys.reduce((s,k)=>s+(catByPeriod[k][a]||0),0),sumB=keys.reduce((s,k)=>s+(catByPeriod[k][b]||0),0);return sumB-sumA;});
  const totalsByPeriod=keys.map(k=>sortedCats.reduce((s,c)=>s+(catByPeriod[k][c]||0),0));
  const stackMx=Math.max(...totalsByPeriod,1);
  const SH=200,SW=keys.length*70;
  const stackBars=keys.map((k,i)=>{
    const x=i*70+10;let yOff=SH;
    const segs=sortedCats.map(c=>{const v=catByPeriod[k][c]||0;if(!v)return'';const h=Math.round(v/stackMx*SH);yOff-=h;return'<rect x="'+x+'" y="'+yOff+'" width="40" height="'+h+'" fill="'+(BARCOL[c]||'#888')+'"><title>'+c+': '+fmt(v)+'</title></rect>';}).join('');
    return segs+'<text x="'+(x+20)+'" y="'+(SH+14)+'" text-anchor="middle" font-size="10" fill="#888">'+pShort(k)+'</text>';
  }).join('');
  const legend=sortedCats.map(c=>'<span style="display:inline-flex;align-items:center;gap:4px;margin-right:10px;font-size:11px;color:#666"><span style="display:inline-block;width:10px;height:10px;background:'+(BARCOL[c]||'#888')+';border-radius:2px"></span>'+c+'</span>').join('');

  return '<div class="card"><div class="card-title">All periods overview</div><svg viewBox="0 0 '+Math.max(W,360)+' '+(H+26)+'" style="width:100%;overflow:visible">'+bars+'</svg><div style="display:flex;gap:16px;margin-top:8px;font-size:12px;color:#888"><span><span style="display:inline-block;width:10px;height:10px;background:#4C9A2A;border-radius:2px;margin-right:4px"></span>Income</span><span><span style="display:inline-block;width:10px;height:10px;background:#378ADD;border-radius:2px;margin-right:4px"></span>Bills</span><span><span style="display:inline-block;width:10px;height:10px;background:#E24B4A;border-radius:2px;margin-right:4px"></span>Debt</span></div></div>'+
  '<div class="card"><div class="card-title">Spending by category per cycle</div><svg viewBox="0 0 '+Math.max(SW,360)+' '+(SH+26)+'" style="width:100%;overflow:visible">'+stackBars+'</svg><div style="margin-top:8px">'+legend+'</div></div>'+
  '<div class="card"><div class="card-title">Period summary</div><div class="hist-row hist-hdr"><div>Period</div><div>Income</div><div>Bills</div><div>Debt paid</div><div>Other exp</div><div>Remaining</div></div>'+keys.map(k=>{const t=calcT(k);return'<div class="hist-row"><div style="font-size:12px;color:#666">'+pShort(k)+'</div><div class="green">'+fmt(t.totalIncome)+'</div><div>'+fmt(t.totalBills)+'</div><div class="red">'+fmt(t.totalDebt)+'</div><div class="amber">'+fmt(t.totalExp)+'</div><div class="'+(t.remaining>=0?'green':'red')+'">'+fmt(t.remaining)+'</div></div>';}).join('')+'</div>';
}

// ───────── SEARCH ─────────
function rSearch(){
  const allKeys=Object.keys(S.periods).sort();
  const allTx=[];
  allKeys.forEach(k=>{(S.periods[k].transactions||[]).forEach(t=>allTx.push(Object.assign({},t,{_pk:k})));});
  const q=(searchQ||'').toLowerCase().trim();

// ───────── CSV IMPORT (multi-file + auto-detect) ─────────
function detectBank(text){const fl=(text.split('\n')[0]||'').toLowerCase();if(fl.includes('card member')||fl.includes('extended details'))return 'amex';if(fl.includes('subcategory')||fl.includes('memo'))return 'barclays';return null;}

async function handleCSV(input){
  const files=Array.from(input.files);
  if(!files.length)return;
  snapshot();
  const allCounts={};let processed=0;
  for(const file of files){
    const text=await new Promise((res)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsText(file);});
    const bank=detectBank(text);
    if(!bank){if(!confirm('Could not detect format for '+file.name+'. Skip this file?')){continue;}continue;}
    const txs=parseCSV(text,bank);
    txs.forEach(t=>{
      const pk=dateToCalendarPeriod(t.date);
      const p=getP(pk);if(!p.transactions)p.transactions=[];
      const m=applyMap(t.rawLabel);
      if(m){t.label=m.label;t.cat=m.cat;}
      else if(t.cat!=='Income'){t.label=t.rawLabel;t.cat=t.cat||'Unknown';}
      t._idx=p.transactions.length;p.transactions.push(t);
      allCounts[pk]=(allCounts[pk]||0)+1;
    });
    processed++;
  }
  sv('periods',S.periods);
  // Auto re-detect periods based on salary arrivals
  const boundaries=detectSalaryPeriods();
  if(boundaries.length){
    const allTx=[];Object.entries(S.periods).forEach(([k,p])=>{(p.transactions||[]).forEach(t=>allTx.push(t));});
    Object.keys(S.periods).forEach(k=>{S.periods[k].transactions=[];});
    allTx.forEach(t=>{const newKey=dynamicPeriodKey(t.date,boundaries);const p=getP(newKey);if(!p.transactions)p.transactions=[];t._idx=p.transactions.length;p.transactions.push(t);applyPeriodLabel(p,boundaries,newKey);});
    sv('periods',S.periods);
  }
  alert('Processed '+processed+' file(s). '+Object.values(allCounts).reduce((a,b)=>a+b,0)+' transactions imported.');
  input.value='';render();
}

function parseCSV(text,bank){
  const lines=text.split('\n').filter(l=>l.trim());const txs=[];
  if(bank==='barclays'){
    for(let i=1;i<lines.length;i++){
      const c=pL(lines[i]);if(c.length<4)continue;
      const date=(c[1]||'').trim(),acc=(c[2]||'').trim(),amtRaw=parseFloat((c[3]||'').replace(/[^0-9.-]/g,'')),sub=(c[4]||'').trim(),rawLabel=(c[5]||'').split('\t')[0].trim();
      if(!rawLabel||isNaN(amtRaw)||amtRaw===0)continue;
      const who=ACC_MAP[acc]||'Unknown',isCredit=amtRaw>0,amount=Math.abs(amtRaw);
      if(isCredit){
        if(sub==='Funds Transfer')continue;
        const fullMemo=(c[5]||'').replace(/\t/g,' ').trim();
        let incLabel=rawLabel,incWho='Unknown';
        if(rawLabel.toUpperCase().includes('CAM UNI HOSP')||rawLabel.toUpperCase().includes('NHS')){
          let matched=false;
          const orderedRefs=Object.keys(NHS_REF_MAP).sort((a,b)=>b.length-a.length);
          for(const ref of orderedRefs){if(fullMemo.includes(ref)){const v=NHS_REF_MAP[ref];incLabel=v.label;incWho=v.who;matched=true;break;}}
          if(!matched){incLabel='NHS Income';incWho='Unknown';}
        } else {incLabel='Income: '+rawLabel;incWho=who||'Unknown';}
        txs.push({date,rawLabel:rawLabel+' '+fullMemo.replace(rawLabel,'').trim(),amount,label:incLabel,cat:'Income',who:incWho,acc,_idx:0});
      } else {txs.push({date,rawLabel,amount,label:rawLabel,cat:'Unknown',who,acc,_idx:0});}
    }
  } else {
    for(let i=1;i<lines.length;i++){
      const c=pL(lines[i]);
      const date=(c[0]||'').trim(),rawLabel=(c[1]||'').trim(),member=(c[2]||'').trim(),amtRaw=parseFloat((c[4]||'').replace(/[^0-9.-]/g,'')),amexCatRaw=(c[12]||'').trim(),amexCat=AMEX_CAT[amexCatRaw]||'';
      if(!rawLabel||isNaN(amtRaw)||amtRaw<=0)continue;
      if(rawLabel.toUpperCase().includes('PAYMENT RECEIVED'))continue;
      const who=member.split(' ')[0];
      txs.push({date,rawLabel,amount:amtRaw,label:rawLabel+' ('+who+')',cat:amexCat||'Unknown',who,cardMember:member,_idx:0});
    }
  }
  return txs;
}
function pL(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){if(l[i]==='"')q=!q;else if(l[i]===','&&!q){r.push(c);c='';}else c+=l[i];}r.push(c);return r;}

function findT(idx,pk){const keys=pk?[pk,...Object.keys(S.periods).filter(k=>k!==pk)]:Object.keys(S.periods);for(const k of keys){const p=S.periods[k];if(p&&p.transactions){const t=p.transactions.find(t=>t._idx===idx);if(t)return{t,k};}}return null;}
function setTx(idx,field,val,pk){snapshot();const f=findT(idx,pk);if(f)f.t[field]=val;sv('periods',S.periods);if(tab==='dashboard'||tab==='history'||tab==='search')render();}
function learnMap(idx,pk){const f=findT(idx,pk);if(!f||!f.t.cat||f.t.cat==='Unknown')return alert('Pick a category first.');snapshot();S.maps[f.t.rawLabel.substring(0,20)]={label:f.t.label,cat:f.t.cat};sv('maps',S.maps);render();}
function delTx(idx,pk){snapshot();const f=findT(idx,pk);if(f)S.periods[f.k].transactions=S.periods[f.k].transactions.filter(t=>t._idx!==idx);sv('periods',S.periods);render();}
function clrPTx(k){if(confirm('Clear imports for '+pShort(k)+'?')){snapshot();S.periods[k].transactions=[];sv('periods',S.periods);render();}}

function addBill(){const n=document.getElementById('bN').value.trim(),a=parseFloat(document.getElementById('bA').value),d=parseInt(document.getElementById('bD').value)||0;if(!n||isNaN(a))return alert('Enter name and amount.');snapshot();S.bills.push({name:n,amount:a,day:d});sv('bills',S.bills);render();}
function delBill(i){snapshot();S.bills.splice(i,1);sv('bills',S.bills);render();}
function addDebt(){const n=document.getElementById('dN').value.trim(),b=parseFloat(document.getElementById('dB').value)||0,r=parseFloat(document.getElementById('dR').value)||0,m=parseFloat(document.getElementById('dM').value)||0,x=document.getElementById('dX').value.trim();if(!n)return alert('Enter a debt name.');snapshot();const i=S.debts.findIndex(d=>d.name===n);if(i>=0){if(!S.debts[i].initialBalance&&b>0)S.debts[i].initialBalance=b;Object.assign(S.debts[i],{balance:b,rate:r,minPayment:m,notes:x});}else S.debts.push({name:n,balance:b,initialBalance:b,rate:r,minPayment:m,notes:x});sv('debts',S.debts);render();}
function delDebt(n){snapshot();S.debts=S.debts.filter(d=>d.name!==n);sv('debts',S.debts);render();}
function addPI(){const n=document.getElementById('piN').value.trim(),item=document.getElementById('piI').value.trim(),t=parseFloat(document.getElementById('piT').value)||0,p=parseFloat(document.getElementById('piP').value)||0,m=parseInt(document.getElementById('piM').value)||0,e=document.getElementById('piE').value,x=document.getElementById('piX').value.trim();if(!n||!p)return alert('Enter a name and monthly payment.');snapshot();if(!S.planIts)S.planIts=[];S.planIts.push({name:n,item,total:t,monthlyPayment:p,monthsRemaining:m,endDate:e,notes:x});sv('planIts',S.planIts);render();}
function delPI(i){snapshot();S.planIts.splice(i,1);sv('planIts',S.planIts);render();}
function addSV(){const n=document.getElementById('svN').value.trim(),g=parseFloat(document.getElementById('svG').value)||0,s=parseFloat(document.getElementById('svS').value)||0,p=document.getElementById('svP').value.trim();if(!n)return alert('Enter a goal name.');snapshot();S.savings.push({name:n,goal:g,saved:s,platform:p});sv('savings',S.savings);render();}
function delSV(i){snapshot();S.savings.splice(i,1);sv('savings',S.savings);render();}
function addSU(){const n=document.getElementById('suN').value.trim(),a=parseFloat(document.getElementById('suA').value)||0,c=document.getElementById('suC').value;if(!n||!a)return alert('Enter name and amount.');snapshot();S.subs.push({name:n,amount:a,cycle:c});sv('subs',S.subs);render();}
function delSU(i){snapshot();S.subs.splice(i,1);sv('subs',S.subs);render();}
function addMap(){const r=document.getElementById('mR').value.trim(),l=document.getElementById('mL').value.trim(),c=document.getElementById('mC').value;if(!r||!l)return alert('Fill in both fields.');snapshot();S.maps[r]={label:l,cat:c};sv('maps',S.maps);render();}
function delMap(k){snapshot();delete S.maps[k];sv('maps',S.maps);render();}
function addCat(){const n=document.getElementById('newCat').value.trim();if(!n)return alert('Enter a category name.');if(getCats().includes(n))return alert('Already exists.');snapshot();S.customCats.push(n);sv('customCats',S.customCats);render();}
function delCat(c){if(LOCKED_CATS.includes(c)||DEFAULT_CATS.includes(c))return alert('Cannot delete default categories.');if(!confirm('Delete category "'+c+'"? Transactions using it will keep the label but the option won\'t appear in dropdowns.'))return;snapshot();S.customCats=S.customCats.filter(x=>x!==c);sv('customCats',S.customCats);render();}

function expD(){const blob=new Blob([JSON.stringify({maps:S.maps,bills:S.bills,debts:S.debts,periods:S.periods,subs:S.subs,savings:S.savings,planIts:S.planIts||[],customCats:S.customCats||[]},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hub-waf-budget-backup.json';a.click();}
function impD(input){const file=input.files[0];if(!file)return;snapshot();const reader=new FileReader();reader.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.maps)S.maps=d.maps;if(d.bills)S.bills=d.bills;if(d.debts)S.debts=d.debts;if(d.periods)S.periods=d.periods;if(d.subs)S.subs=d.subs;if(d.savings)S.savings=d.savings;if(d.planIts)S.planIts=d.planIts;if(d.customCats)S.customCats=d.customCats;sv('maps',S.maps);sv('bills',S.bills);sv('debts',S.debts);sv('periods',S.periods);sv('subs',S.subs);sv('savings',S.savings);sv('planIts',S.planIts);sv('customCats',S.customCats);render();}catch(e){alert('Invalid JSON.');}};reader.readAsText(file);input.value='';}
function clrAll(){localStorage.clear();location.reload();}

render();
</script>
